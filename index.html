<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodi11 IPL Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; }
        .navbar { background: #1a237e; color: white; padding: 12px; text-align: center; font-weight: bold; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .hidden { display: none !important; }
        .joined-item { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #1a237e; }
        .score-badge { background: #ff5722; color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="navbar">🏏 JODI11 IPL PRO</div>

<div class="container mt-3">
    <div id="loginSection" class="card p-4 mx-auto" style="max-width: 400px;">
        <input id="username" class="form-control mb-2" placeholder="Username">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">
        <button onclick="login()" class="btn btn-primary w-100">Login</button>
        <button onclick="signup()" class="btn btn-link w-100 btn-sm">Create Account</button>
    </div>

    <div id="homeSection" class="hidden">
        <div class="d-flex justify-content-between mb-3">
            <b>👤 <span id="displayUser"></span></b>
            <b class="text-success">💰 <span id="displayCoins">0</span></b>
        </div>

        <div class="card p-3">
            <label class="small fw-bold">Select Match</label>
            <select id="matchSelect" class="form-select mb-3" onchange="loadPlayers()"></select>
            
            <div id="playerSelection" class="hidden">
                <div class="row g-2">
                    <div class="col-6"><select id="p1" class="form-select"></select></div>
                    <div class="col-6"><select id="p2" class="form-select"></select></div>
                </div>
                <button onclick="joinMatch()" class="btn btn-success w-100 mt-3">Join Contest (200)</button>
                <p id="msg" class="text-center mt-2 small"></p>
            </div>
        </div>

        <div id="joinedSection" class="hidden">
            <h6 class="fw-bold">📊 Real-time Scoreboard</h6>
            <div id="joinList"></div>
        </div>

        <button id="adminBtn" onclick="showAdmin()" class="btn btn-dark w-100 mt-3 hidden">⚙️ Admin Panel</button>
        <button onclick="location.reload()" class="btn btn-light w-100 mt-2 btn-sm">Logout</button>
    </div>

    <div id="adminSection" class="card p-4 hidden">
        <h6>⚙️ Admin Control</h6>
        <div class="border p-2 mb-3 rounded">
            <input id="admMatch" class="form-control form-control-sm mb-2" placeholder="Match (e.g. MI_CSK)">
            <select id="admTeam" class="form-select form-select-sm mb-2"><option value="team1">Team 1</option><option value="team2">Team 2</option></select>
            <input id="admPlayer" class="form-control form-control-sm mb-2" placeholder="Player Name">
            <button onclick="addPlayer()" class="btn btn-danger btn-sm w-100">Add Player</button>
        </div>
        <div class="border p-2 bg-light rounded">
            <select id="runMatch" class="form-select form-select-sm mb-2" onchange="loadAdminPlayers()"></select>
            <select id="runPlayer" class="form-select form-select-sm mb-2"></select>
            <input id="newRuns" type="number" class="form-control form-control-sm mb-2" placeholder="Total Runs">
            <button onclick="updateRuns()" class="btn btn-primary btn-sm w-100">Update Score</button>
        </div>
        <button onclick="goHome()" class="btn btn-link w-100">Back</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBjZYfXDA3HHLE_GrcYu--RSJkRpLUsmSs",
    databaseURL: "https://jodi-4d904-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = "";
const ADMINS = ["admin", "santoshbagul"];

function signup() {
    let u = username.value.toLowerCase().trim();
    let p = password.value.trim();
    if(!u || !p) return;
    db.ref("Users/"+u).once("value", s => {
        if(s.exists()) return alert("User exists!");
        db.ref("Users/"+u).set({password:p, coins:2000}).then(()=>alert("Signup OK!"));
    });
}

function login() {
    let u = username.value.toLowerCase().trim();
    let p = password.value.trim();
    db.ref("Users/"+u).once("value", s => {
        if(!s.exists() || s.val().password !== p) return alert("Wrong!");
        currentUser = u;
        loginSection.classList.add("hidden");
        homeSection.classList.remove("hidden");
        displayUser.innerText = u;
        db.ref("Users/"+u+"/coins").on("value", sn => displayCoins.innerText = sn.val());
        if(ADMINS.includes(u)) adminBtn.classList.remove("hidden");
        loadMatches();
    });
}

function loadMatches() {
    db.ref("Players").once("value", snap => {
        let opt = "<option value=''>-- Select Match --</option>";
        snap.forEach(m => opt += `<option value="${m.key}">${m.key}</option>`);
        matchSelect.innerHTML = opt;
        runMatch.innerHTML = opt;
    });
}

function loadPlayers() {
    let m = matchSelect.value;
    if(!m) return;
    p1.innerHTML = ""; p2.innerHTML = "";
    db.ref("Players/"+m+"/team1").once("value", s => s.forEach(d => p1.innerHTML += `<option>${d.val()}</option>`));
    db.ref("Players/"+m+"/team2").once("value", s => s.forEach(d => p2.innerHTML += `<option>${d.val()}</option>`));
    playerSelection.classList.remove("hidden");
    joinedSection.classList.remove("hidden");
    loadJoined(m);
}

function joinMatch() {
    let m = matchSelect.value;
    let pair = p1.value + " & " + p2.value;
    db.ref("Selections/"+m+"/"+currentUser).once("value", s => {
        if(s.exists()) return alert("Already joined!");
        db.ref("Users/"+currentUser+"/coins").once("value", c => {
            if(c.val() < 200) return alert("Low coins!");
            db.ref("Users/"+currentUser+"/coins").set(c.val() - 200);
            db.ref("Selections/"+m+"/"+currentUser).set(pair);
            msg.innerText = "Joined! ✅";
        });
    });
}

// 🔥 FIX: Jodi repeat hou naye mhanun innerHTML clear kela aahe
function loadJoined(m) {
    db.ref("Selections/"+m).on("value", snap => {
        db.ref("LiveScore/"+m).on("value", scSnap => {
            let scores = scSnap.val() || {};
            joinList.innerHTML = ""; // Clear existing list
            if(!snap.exists()) return;

            snap.forEach(u => {
                let pair = u.val();
                let pArr = pair.split(" & ");
                let r1 = scores[pArr[0]] || 0;
                let r2 = scores[pArr[1]] || 0;
                joinList.innerHTML += `
                    <div class="joined-item d-flex justify-content-between align-items-center">
                        <div><b>${u.key}</b><br><small>${pair}</small></div>
                        <div class="text-end">
                            <span class="score-badge">${r1}+${r2}</span><br>
                            <b>Total: ${r1+r2}</b>
                        </div>
                    </div>`;
            });
        });
    });
}

// ADMIN FUNCTIONS
function loadAdminPlayers() {
    let m = runMatch.value;
    runPlayer.innerHTML = "";
    db.ref("Players/"+m).once("value", snap => {
        snap.forEach(t => t.forEach(p => runPlayer.innerHTML += `<option>${p.val()}</option>`));
    });
}

function updateRuns() {
    let m = runMatch.value;
    let p = runPlayer.value;
    let r = parseInt(newRuns.value);
    if(!m || isNaN(r)) return;
    db.ref("LiveScore/"+m+"/"+p).set(r).then(() => {
        alert("Updated!");
        newRuns.value = "";
    });
}

function addPlayer() {
    let m = admMatch.value.trim().replace(/\s+/g, '_');
    let t = admTeam.value;
    let p = admPlayer.value.trim();
    if(!m || !p) return;
    db.ref("Players/"+m+"/"+t).push(p).then(() => {
        alert("Added!");
        admPlayer.value = "";
        loadMatches();
    });
}

function showAdmin() { homeSection.classList.add("hidden"); adminSection.classList.remove("hidden"); }
function goHome() { adminSection.classList.add("hidden"); homeSection.classList.remove("hidden"); }
</script>
</body>
</html>
