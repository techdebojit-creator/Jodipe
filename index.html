<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodi11 Pro - Santosh Bagul</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); font-size: 14px; }
        .navbar { background: linear-gradient(135deg, #1a237e, #0d47a1); color: white; padding: 12px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .coin-badge { background: #fff3e0; color: #e65100; padding: 5px 12px; border-radius: 20px; font-weight: 700; border: 1px solid #ffcc80; }
        .score-row { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .total-badge { background: #1a237e; color: white; padding: 4px 10px; border-radius: 8px; font-weight: 700; }
        .hidden { display: none !important; }
        .lang-btn { font-size: 11px; border: 1px solid white; padding: 2px 8px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="navbar d-flex justify-content-between align-items-center px-3">
    <div>
        <h5 class="m-0 fw-bold">🏏 JODI11 PRO</h5>
        <div class="lang-btn mt-1 d-inline-block" onclick="toggleLang()" id="langBtn">English</div>
    </div>
    <div id="coinArea" class="hidden">
        <div class="coin-badge">💰 <span id="displayCoins">0</span> <button class="btn btn-sm p-0 px-1 fw-bold" onclick="showCoinForm()">+</button></div>
    </div>
</div>

<div class="container mt-3">
    <div id="loginSection" class="card p-4 mx-auto" style="max-width: 400px;">
        <h6 class="text-center fw-bold mb-3" id="authTitle">लॉगिन करा</h6>
        <input id="username" class="form-control mb-2" placeholder="User ID">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">
        <button id="loginBtn" onclick="login()" class="btn btn-primary w-100 fw-bold mb-2">LOGIN</button>
        <button id="signupBtn" onclick="signup()" class="btn btn-success w-100 fw-bold hidden">CREATE ACCOUNT</button>
        <div class="text-center mt-2 small"><a href="javascript:void(0)" onclick="toggleAuthMode()" id="toggleAuth">नवीन खाते उघडा</a></div>
    </div>

    <div id="homeSection" class="hidden">
        <div class="card p-3 mb-3">
            <select id="matchSelect" class="form-select mb-3" onchange="checkMatchStatus()">
                <option value="" id="optMatch">-- मॅच निवडा --</option>
                <option value="RCB_vs_GT" data-t1="RCB" data-t2="GT">RCB vs GT</option>
                <option value="DC_vs_PBKS" data-t1="DC" data-t2="PBKS">DC vs PBKS</option>
                <option value="RR_vs_SRH" data-t1="RR" data-t2="SRH">RR vs SRH</option>
                <option value="CSK_vs_GT" data-t1="CSK" data-t2="GT">CSK vs GT</option>
            </select>

            <div id="activeMatchArea" class="hidden">
                <div class="row g-2 mb-3 text-center">
                    <div class="col-6 border-end"><b id="labelT1"></b><select id="p1" class="form-select form-select-sm mt-1"></select></div>
                    <div class="col-6"><b id="labelT2"></b><select id="p2" class="form-select form-select-sm mt-1"></select></div>
                </div>
                <button onclick="joinMatch()" class="btn btn-success w-100 fw-bold" id="btnJoin">जोडी लावा (200 Coins)</button>
                <p class="text-center small mt-2 text-muted" id="limitLabel">Limit: Max 5 jodis per match</p>
            </div>
        </div>

        <div id="scoreArea">
            <h6 class="fw-bold mb-2 small">📊 LIVE SCOREBOARD</h6>
            <div id="joinList" class="card p-3"></div>
        </div>

        <div class="d-grid gap-2 mt-4 pb-5">
            <button id="adminBtn" onclick="showAdmin()" class="btn btn-dark hidden">⚙️ ADMIN CONTROL</button>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm">LOGOUT</button>
        </div>
    </div>

    <div id="adminSection" class="card p-4 hidden">
        <h6 class="fw-bold text-danger border-bottom pb-2">⚙️ ADMIN CONTROL</h6>
        <div class="bg-light p-2 rounded mb-3">
            <input id="targetUser" class="form-control form-control-sm mb-1" placeholder="User ID">
            <input id="addAmount" type="number" class="form-control form-control-sm mb-1" placeholder="Coins">
            <button onclick="updateUserCoins()" class="btn btn-warning btn-sm w-100">Add Coins</button>
        </div>
        <select id="runMatch" class="form-select mb-3" onchange="loadAdminPlayers()"></select>
        <div id="adminPlayerList" class="bg-white border rounded p-1" style="max-height:300px; overflow-y:auto;"></div>
        <button onclick="goHome()" class="btn btn-secondary w-100 mt-3 btn-sm">Home</button>
    </div>
</div>

<script>
// CONFIG
const firebaseConfig = { apiKey: "AIzaSyBjZYfXDA3HHLE_GrcYu--RSJkRpLUsmSs", databaseURL: "https://jodi-4d904-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = "";
let currentLang = "mr";
const ADMINS = ["admin", "santoshbagul"];

const squad = {
    "RCB": { logo: "", players: ["Virat Kohli", "Rajat Patidar", "Phil Salt", "Siraj"] },
    "GT": { logo: "", players: ["Shubman Gill", "Rashid Khan", "Sai Sudharsan", "Miller"] },
    "DC": { logo: "", players: ["Rishabh Pant", "Axar Patel", "Kuldeep Yadav"] },
    "PBKS": { logo: "", players: ["Arshdeep Singh", "Sam Curran", "Shashank Singh"] },
    "RR": { logo: "", players: ["Sanju Samson", "Yashasvi Jaiswal", "Riyan Parag"] },
    "SRH": { logo: "", players: ["Travis Head", "Abhishek Sharma", "Klaasen"] },
    "CSK": { logo: "", players: ["Ruturaj Gaikwad", "MS Dhoni", "Jadeja"] }
};

// LANGUAGE LOGIC
function toggleLang() {
    currentLang = currentLang === "mr" ? "en" : "mr";
    document.getElementById("langBtn").innerText = currentLang === "mr" ? "English" : "मराठी";
    document.getElementById("authTitle").innerText = currentLang === "mr" ? "लॉगिन करा" : "Login";
    document.getElementById("optMatch").innerText = currentLang === "mr" ? "-- मॅच निवडा --" : "-- Select Match --";
    document.getElementById("btnJoin").innerText = currentLang === "mr" ? "जोडी लावा (200 Coins)" : "Join Jodi (200 Coins)";
}

// AUTH
function login() {
    let u = username.value.toLowerCase().trim(); let p = password.value.trim();
    db.ref("Users/"+u).once("value", s => {
        if(!s.exists() || s.val().password !== p) return alert("Wrong ID/Pass!");
        localStorage.setItem("jodiUser", u); startSession(u);
    });
}
function signup() {
    let u = username.value.toLowerCase().trim(); let p = password.value.trim();
    db.ref("Users/"+u).set({password:p, coins:0}).then(()=> { alert("Account Created!"); toggleAuthMode(); });
}
function startSession(u) {
    currentUser = u; loginSection.classList.add("hidden"); homeSection.classList.remove("hidden"); coinArea.classList.remove("hidden");
    db.ref("Users/"+u+"/coins").on("value", s => displayCoins.innerText = s.val() || 0);
    if(ADMINS.includes(u)) adminBtn.classList.remove("hidden");
    runMatch.innerHTML = matchSelect.innerHTML;
}

// MATCH LOGIC
function checkMatchStatus() {
    let sel = matchSelect; if(!sel.value) return;
    let t1 = sel.options[sel.selectedIndex].getAttribute("data-t1");
    let t2 = sel.options[sel.selectedIndex].getAttribute("data-t2");
    labelT1.innerText = t1; labelT2.innerText = t2;
    activeMatchArea.classList.remove("hidden");
    loadPlayers(sel.value, t1, t2);
}

function loadPlayers(mid, t1, t2) {
    db.ref("Players/"+mid).once("value", snap => {
        if(!snap.exists()){
            let up = {};
            squad[t1].players.forEach((p, i) => up[`team1/p${i+1}`] = p);
            squad[t2].players.forEach((p, i) => up[`team2/p${i+11}`] = p);
            db.ref("Players/"+mid).update(up).then(() => renderDrop(mid));
        } else renderDrop(mid);
    });
}

function renderDrop(mid) {
    db.ref(`Players/${mid}/team1`).once("value", s => { let h = ""; s.forEach(d => h += `<option value="${d.key}">${d.val()}</option>`); p1.innerHTML = h; });
    db.ref(`Players/${mid}/team2`).once("value", s => { let h = ""; s.forEach(d => h += `<option value="${d.key}">${d.val()}</option>`); p2.innerHTML = h; });
    refreshScore(mid);
}

function joinMatch() {
    let mid = matchSelect.value;
    let p1_id = p1.value, p2_id = p2.value;
    let pairID = p1_id + "|" + p2_id;
    let pairNames = p1.options[p1.selectedIndex].text + " & " + p2.options[p2.selectedIndex].text;

    db.ref("Selections/"+mid).once("value", snap => {
        let userJodiCount = 0; let taken = false;
        snap.forEach(c => {
            if(c.val().user === currentUser) userJodiCount++;
            if(c.val().pairID === pairID) taken = true;
        });

        if(userJodiCount >= 5) return alert(currentLang==="mr"?"मर्यादा संपली: 5 जोड्या!":"Limit Reached: 5 Jodis!");
        if(taken) return alert(currentLang==="mr"?"ही जोडी आधीच घेतली आहे!":"Jodi already taken!");

        db.ref("Users/"+currentUser+"/coins").once("value", c => {
            let b = c.val()||0; if(b < 200) return alert("No Coins!");
            db.ref("Users/"+currentUser+"/coins").set(b - 200);
            db.ref("Selections/"+mid).push({user: currentUser, pairID, pairNames, p1_id, p2_id});
            alert("Success!");
        });
    });
}

function refreshScore(mid) {
    db.ref("Selections/"+mid).on("value", snap => {
        db.ref("LiveScore/"+mid).on("value", scSnap => {
            let runs = scSnap.val() || {}; let h = "";
            snap.forEach(u => {
                let d = u.val(); let r1 = runs[d.p1_id]||0, r2 = runs[d.p2_id]||0;
                let names = d.pairNames.split(" & ");
                h += `<div class="score-row">
                    <div><b>${d.user}</b><br><small>${names[0]}(${r1}) + ${names[1]}(${r2})</small></div>
                    <div class="total-badge">${r1+r2}</div>
                </div>`;
            });
            joinList.innerHTML = h || "No Jodis";
        });
    });
}

// ADMIN
function loadAdminPlayers() {
    let mid = runMatch.value; if(!mid) return;
    db.ref("Players/"+mid).once("value", snap => {
        db.ref("LiveScore/"+mid).on("value", scSnap => {
            let scores = scSnap.val() || {}; let h = "";
            snap.forEach(team => {
                h += `<div class="bg-dark text-white p-1 small mt-2">${team.key.toUpperCase()}</div>`;
                team.forEach(p => {
                    let pid = p.key, r = scores[pid]||0;
                    h += `<div class="d-flex justify-content-between p-2 border-bottom align-items-center">
                        <span>${p.val()} (<b>${r}</b>)</span>
                        <div>
                            <button onclick="updateRun('${mid}','${pid}','${p.val()}',${r})" class="btn btn-sm btn-success py-0">Edit</button>
                            <button onclick="resetRun('${mid}','${pid}')" class="btn btn-sm btn-outline-danger py-0">Reset</button>
                        </div>
                    </div>`;
                });
            });
            adminPlayerList.innerHTML = h;
        });
    });
}
function updateRun(m, id, n, c) { let s = prompt("Runs for "+n, c); if(s!==null) db.ref(`LiveScore/${m}/${id}`).set(parseInt(s)); }
function resetRun(m, id) { if(confirm("Reset?")) db.ref(`LiveScore/${m}/${id}`).remove(); }
function updateUserCoins() {
    let t = targetUser.value.toLowerCase().trim(); let a = parseInt(addAmount.value);
    db.ref("Users/"+t+"/coins").once("value", s => db.ref("Users/"+t+"/coins").set((s.val()||0)+a).then(()=>alert("Coins Added!")));
}
function toggleAuthMode() { isLoginMode=!isLoginMode; authTitle.innerText=isLoginMode?"लॉगिन करा":"नवीन खाते"; loginBtn.classList.toggle("hidden",!isLoginMode); signupBtn.classList.toggle("hidden",isLoginMode); }
function goHome() { adminSection.classList.add("hidden"); homeSection.classList.remove("hidden"); }
function showAdmin() { homeSection.classList.add("hidden"); adminSection.classList.remove("hidden"); runMatch.innerHTML=matchSelect.innerHTML; }
function logout() { localStorage.removeItem("jodiUser"); location.reload(); }
</script>
</body>
</html>
