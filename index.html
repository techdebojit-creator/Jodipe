<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JODI11 PRO - Admin Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #002f6c; --secondary: #ffcc00; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; font-size: 14px; }
        .navbar { background: var(--primary); color: white; border-bottom: 3px solid var(--secondary); }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .btn-primary { background: var(--primary); border: none; }
        .admin-badge { background: #ffebee; color: #c62828; font-weight: bold; border: 1px solid #ef9a9a; }
    </style>
</head>
<body>

<nav class="navbar px-3 py-2">
    <div class="container-fluid d-flex justify-content-between">
        <h5 class="m-0 fw-bold">🏏 JODI11 PRO</h5>
        <div id="coinBox" class="hidden"><span class="badge bg-light text-dark shadow-sm">💰 <span id="balanceText">0</span></span></div>
    </div>
</nav>
<div class="card p-3 mb-3 shadow-sm border-warning">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="m-0 fw-bold">💰 Balance: ₹ <span id="userBalance">0</span></h6>
        <button onclick="document.getElementById('reqBox').classList.toggle('hidden')" class="btn btn-sm btn-outline-warning">+ Add Coins</button>
    </div>
    
    <div id="reqBox" class="input-group input-group-sm hidden">
        <input id="coinAmt" type="number" class="form-control" placeholder="Rakkam taka">
        <button onclick="sendCoinReq()" class="btn btn-warning fw-bold">Request</button>
    </div>
</div>

<div id="adminWalletPanel" class="card p-3 mb-3 border-danger hidden">
    <h6 class="text-danger fw-bold border-bottom pb-2">🔔 Pending Coin Requests</h6>
    <div id="reqListArea">
        </div>
</div>

<div class="container mt-3">
    <div id="authSection" class="card p-4 mx-auto shadow" style="max-width: 400px;">
        <h4 class="text-center fw-bold mb-4" id="authTitle">Login</h4>
        <input id="userId" class="form-control mb-3" placeholder="Username">
        <input id="userPass" type="password" class="form-control mb-3" placeholder="Password">
        <div id="loginGroup">
            <button onclick="handleAuth(true)" class="btn btn-primary w-100 fw-bold mb-3">LOG IN</button>
            <p class="text-center small">Account nahi? <a href="#" onclick="toggleAuth(false)">Sign Up</a></p>
        </div>
        <div id="signupGroup" class="hidden">
            <button onclick="handleAuth(false)" class="btn btn-success w-100 fw-bold mb-3">SIGN UP</button>
            <p class="text-center small">Account aahe? <a href="#" onclick="toggleAuth(true)">Login</a></p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="card p-3 mb-3">
            <label class="small fw-bold text-muted">SELECT MATCH</label>
            <select id="matchSelect" class="form-select mb-3" onchange="loadMatchBoard()"></select>

            <div id="playArea" class="hidden">
                <div class="row g-2 mb-3">
                    <div class="col-6"><select id="p1" class="form-select form-select-sm"></select></div>
                    <div class="col-6"><select id="p2" class="form-select form-select-sm"></select></div>
                </div>
                <button onclick="joinJodi()" class="btn btn-success w-100 fw-bold">JOIN JODI (200 Coins)</button>
            </div>
        </div>

        <h6 class="fw-bold">📊 LIVE STANDINGS</h6>
        <div id="scoreBoard" class="card p-2 mb-4" style="min-height: 100px;"></div>

        <div class="d-flex gap-2 pb-5">
            <button id="adminBtn" onclick="showAdmin()" class="btn btn-dark w-100 hidden">⚙️ ADMIN CONTROL</button>
            <button onclick="location.reload()" class="btn btn-outline-danger w-100">LOGOUT</button>
        </div>
    </div>

    <div id="adminPanel" class="hidden">
        <div class="card p-3 admin-badge mb-3">
            <h6 class="m-0">ADMIN MASTER CONTROL</h6>
        </div>

        <div class="card p-3 mb-3 border-primary">
            <p class="fw-bold small mb-2 text-primary text-uppercase">1. Add New IPL Match</p>
            <input id="newMatchId" class="form-control form-control-sm mb-2" placeholder="Match ID (e.g. MI_vs_RCB)">
            <div class="row g-2 mb-2">
                <div class="col-6"><input id="team1Name" class="form-control form-control-sm" placeholder="Team 1 Name"></div>
                <div class="col-6"><input id="team2Name" class="form-control form-control-sm" placeholder="Team 2 Name"></div>
            </div>
            <button onclick="addNewMatch()" class="btn btn-primary btn-sm w-100">Create Match</button>
        </div>

        <div class="card p-3 mb-3 border-success">
            <p class="fw-bold small mb-2 text-success text-uppercase">2. Add Missing Player</p>
            <select id="targetMatch" class="form-select form-select-sm mb-2"></select>
            <div class="input-group input-group-sm mb-2">
                <select id="playerTeam" class="form-select"><option value="team1">Team 1</option><option value="team2">Team 2</option></select>
                <input id="playerName" class="form-control" placeholder="Player Name">
            </div>
            <button onclick="addPlayerToMatch()" class="btn btn-success btn-sm w-100">Add Player</button>
        </div>

        <div class="card p-3 mb-3 border-warning">
            <p class="fw-bold small mb-2 text-dark text-uppercase">3. Live Run Updater</p>
            <div id="adminPlayerList" class="bg-white border rounded" style="max-height: 250px; overflow-y: auto;"></div>
        </div>

        <button onclick="closeAdmin()" class="btn btn-secondary w-100 mb-5">Back to Home</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyBjZYfXDA3HHLE_GrcYu--RSJkRpLUsmSs", databaseURL: "https://jodi-4d904-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = "";
const ADMIN_ID = "santoshbagul";

// Auth Function
function toggleAuth(isLogin) {
    authTitle.innerText = isLogin ? "Login" : "Sign Up";
    loginGroup.classList.toggle("hidden", !isLogin);
    signupGroup.classList.toggle("hidden", isLogin);
}

function handleAuth(isLogin) {
    let id = userId.value.toLowerCase().trim();
    let pass = userPass.value.trim();
    if(!id || !pass) return alert("All fields required!");

    db.ref("Users/"+id).once("value", s => {
        if(isLogin) {
            if(s.exists() && s.val().password === pass) proceedApp(id);
            else alert("Invalid Login!");
        } else {
            if(s.exists()) alert("User already exists!");
            else db.ref("Users/"+id).set({password:pass, coins:500}).then(()=> proceedApp(id));
        }
    });
}

function proceedApp(id) {
    user = id; authSection.classList.add("hidden"); mainApp.classList.remove("hidden"); coinBox.classList.remove("hidden");
    if(user === ADMIN_ID) adminBtn.classList.remove("hidden");
    db.ref("Users/"+user+"/coins").on("value", s => balanceText.innerText = s.val()||0);
    loadMatches();
}
// 1. Request Pathvane
function sendCoinReq() {
    let amt = parseInt(document.getElementById("coinAmt").value);
    if (!amt || amt <= 0) return alert("Rakkam taka!");

    db.ref("CoinRequests").push({
        u: user, // user mhanje login jhalela ID
        amount: amt,
        status: "pending"
    }).then(() => {
        alert("Request Sent! Admin approve karel.");
        document.getElementById("coinAmt").value = "";
        document.getElementById("reqBox").classList.add("hidden");
    });
}

// 2. Admin ne Approve karane
function approveCoins(reqId, targetUser, amt) {
    db.ref("Users/" + targetUser + "/coins").once("value", s => {
        let current = s.val() || 0;
        db.ref("Users/" + targetUser + "/coins").set(current + amt).then(() => {
            db.ref("CoinRequests/" + reqId).remove(); // Approve jhalyaver delete kara
            alert(amt + " coins added to " + targetUser);
        });
    });
}

// Match & Player Logic
function loadMatches() {
    db.ref("MatchList").on("value", s => {
        let h = "<option value=''>-- Select Match --</option>";
        s.forEach(m => h += `<option value="${m.key}">${m.val().name}</option>`);
        matchSelect.innerHTML = h; targetMatch.innerHTML = h;
    });
}

function loadMatchBoard() {
    let mid = matchSelect.value; if(!mid) return;
    playArea.classList.remove("hidden");
    db.ref("Players/"+mid).on("value", s => {
        let d = s.val(); if(!d) return;
        let h1="", h2="";
        for(let k in d.team1) h1 += `<option value="${k}">${d.team1[k]}</option>`;
        for(let k in d.team2) h2 += `<option value="${k}">${d.team2[k]}</option>`;
        p1.innerHTML = h1; p2.innerHTML = h2;
    });
    listenScores(mid);
}

function joinJodi() {
    let mid = matchSelect.value;
    let p1id = p1.value, p2id = p2.value;
    let txt = p1.options[p1.selectedIndex].text + " + " + p2.options[p2.selectedIndex].text;

    db.ref("Users/"+user+"/coins").once("value", c => {
        let bal = c.val()||0; if(bal < 200) return alert("Low Coins!");
        db.ref("Selections/"+mid).push({u: user, p1:p1id, p2:p2id, txt:txt});
        db.ref("Users/"+user+"/coins").set(bal - 200);
        alert("Jodi Joined!");
    });
}

function listenScores(mid) {
    db.ref("Selections/"+mid).on("value", sel => {
        db.ref("LiveScore/"+mid).on("value", sc => {
            let runs = sc.val()||{}; let h = "";
            sel.forEach(item => {
                let d = item.val(); let s1 = runs[d.p1]||0, s2 = runs[d.p2]||0;
                h += `<div class="d-flex justify-content-between p-2 border-bottom">
                    <div><b>${d.u.toUpperCase()}</b><br><small>${d.txt}</small></div>
                    <div class="badge bg-primary fs-6 h-50 mt-2">${s1+s2}</div>
                </div>`;
            });
            scoreBoard.innerHTML = h || "<p class='text-center p-3'>No Jodis yet</p>";
        });
    });
}

// --- MASTER ADMIN FUNCTIONS ---
function addNewMatch() {
    let mid = newMatchId.value.trim();
    let t1 = team1Name.value.trim();
    let t2 = team2Name.value.trim();
    if(!mid || !t1 || !t2) return alert("Fill all match details!");

    db.ref("MatchList/"+mid).set({name: t1+" vs "+t2, t1:t1, t2:t2});
    alert("Match Created!"); newMatchId.value=""; team1Name.value=""; team2Name.value="";
}

function addPlayerToMatch() {
    let mid = targetMatch.value;
    let team = playerTeam.value;
    let pName = playerName.value.trim();
    if(!mid || !pName) return alert("Select match & enter name!");

    let pid = "p" + Date.now();
    db.ref(`Players/${mid}/${team}/${pid}`).set(pName).then(()=> {
        playerName.value=""; alert("Player Added!");
    });
}

function loadAdminPlayers() {
    let mid = matchSelect.value;
    if(!mid) return adminPlayerList.innerHTML = "<p class='p-3'>Select match in main screen first!</p>";
    db.ref("Players/"+mid).once("value", p => {
        db.ref("LiveScore/"+mid).on("value", sc => {
            let r = sc.val()||{}; let h = "";
            p.forEach(team => {
                h += `<div class="bg-dark text-white p-1 small ps-2">${team.key.toUpperCase()}</div>`;
                team.forEach(player => {
                    h += `<div class="d-flex justify-content-between p-1 border-bottom align-items-center bg-white">
                        <span class="ps-2">${player.val()}</span>
                        <input type="number" class="form-control form-control-sm w-25" value="${r[player.key]||0}" 
                        onchange="db.ref('LiveScore/${mid}/${player.key}').set(parseInt(this.value))">
                    </div>`;
                });
            });
            adminPlayerList.innerHTML = h;
        });
    });
}

function showAdmin() { mainApp.classList.add("hidden"); adminPanel.classList.remove("hidden"); loadAdminPlayers(); }
function closeAdmin() { adminPanel.classList.add("hidden"); mainApp.classList.remove("hidden"); }
</script>
</body>
</html>
