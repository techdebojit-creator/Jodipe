<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JODI11 PRO - IPL 2026 Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --ipl-blue: #192356; --ipl-gold: #efb819; --bg: #f0f2f5; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: #333; }
        .navbar { background: var(--ipl-blue); color: white; border-bottom: 3px solid var(--ipl-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .navbar h5 { font-family: 'Oswald', sans-serif; letter-spacing: 1px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .btn-primary { background: var(--ipl-blue); border: none; font-weight: 600; }
        .btn-primary:hover { background: #0d143c; }
        .coin-badge { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; font-weight: 700; padding: 5px 15px; border-radius: 25px; border: 1px solid #fff; }
        .score-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; transition: 0.3s; }
        .score-row:hover { background: #f9f9f9; }
        .total-badge { background: var(--ipl-blue); color: white; padding: 5px 12px; border-radius: 8px; font-weight: bold; min-width: 50px; text-align: center; }
        .hidden { display: none !important; }
        .admin-section { border-left: 5px solid #dc3545; }
    </style>
</head>
<body>

<nav class="navbar px-3 py-2 sticky-top">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <h5 class="m-0">🏆 JODI11 PRO</h5>
        <div id="coinDisplay" class="hidden">
            <span class="coin-badge">💰 <span id="userBalance">0</span></span>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div id="loginBox" class="card p-4 mx-auto shadow" style="max-width: 380px;">
        <h4 class="text-center fw-bold mb-4">Login</h4>
        <input id="loginId" class="form-control mb-3" placeholder="Username (e.g. santosh)">
        <input id="loginPass" type="password" class="form-control mb-4" placeholder="Password">
        <button onclick="handleAuth()" class="btn btn-primary w-100 py-2">PROCEED</button>
    </div>

    <div id="mainApp" class="hidden">
        <div class="card p-3">
            <label class="small fw-bold mb-1 text-muted">SELECT LIVE MATCH</label>
            <select id="matchDropdown" class="form-select mb-3" onchange="initMatchView()">
                <option value="">-- Choose Match --</option>
                <option value="RCB_vs_GT" data-t1="RCB" data-t2="GT">RCB vs GT (Bengaluru)</option>
                <option value="MI_vs_CSK" data-t1="MI" data-t2="CSK">MI vs CSK (Wankhede)</option>
                <option value="DC_vs_PBKS" data-t1="DC" data-t2="PBKS">DC vs PBKS (Delhi)</option>
                <option value="RR_vs_SRH" data-t1="RR" data-t2="SRH">RR vs SRH (Jaipur)</option>
                <option value="LSG_vs_KKR" data-t1="LSG" data-t2="KKR">LSG vs KKR (Lucknow)</option>
            </select>

            <div id="selectionArea" class="hidden animate__animated animate__fadeIn">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="small fw-bold" id="t1Name">Team 1</label>
                        <select id="p1Select" class="form-select form-select-sm"></select>
                    </div>
                    <div class="col-6">
                        <label class="small fw-bold" id="t2Name">Team 2</label>
                        <select id="p2Select" class="form-select form-select-sm"></select>
                    </div>
                </div>
                <button onclick="saveJodi()" class="btn btn-success w-100 fw-bold shadow-sm">JOIN JODI (200 Coins)</button>
            </div>
        </div>

        <div id="scoreContainer" class="hidden">
            <h6 class="fw-bold px-1 text-uppercase" style="color:var(--ipl-blue)">📊 Live User Standings</h6>
            <div id="liveFeed" class="card"></div>
        </div>

        <div class="d-flex gap-2 mt-4 pb-5">
            <button id="adminBtn" onclick="toggleAdmin()" class="btn btn-dark w-100 hidden">⚙️ ADMIN PANEL</button>
            <button onclick="logout()" class="btn btn-outline-danger w-100">LOGOUT</button>
        </div>
    </div>

    <div id="adminPanel" class="hidden animate__animated animate__slideInUp">
        <div class="card p-3 admin-section">
            <h5 class="fw-bold text-danger mb-3">ADMIN CONTROL PANEL</h5>
            
            <div class="bg-light p-2 rounded mb-3 border">
                <label class="small fw-bold">Add Missing Player to Squad</label>
                <div class="input-group input-group-sm">
                    <select id="targetTeam" class="form-select"><option value="team1">Team 1</option><option value="team2">Team 2</option></select>
                    <input id="newPlayerName" class="form-control w-50" placeholder="Player Name">
                    <button onclick="addPlayerToDB()" class="btn btn-danger">Add</button>
                </div>
            </div>

            <label class="small fw-bold">Live Run Updater</label>
            <div id="adminPlayerList" class="bg-white border rounded" style="max-height: 300px; overflow-y: auto;">
                <p class="text-center p-3 text-muted">Select a match to update runs</p>
            </div>
            
            <button onclick="toggleAdmin()" class="btn btn-secondary w-100 mt-3">Back to App</button>
        </div>
    </div>
</div>

<script>
// --- CONFIGURATION ---
const firebaseConfig = { apiKey: "AIzaSyBjZYfXDA3HHLE_GrcYu--RSJkRpLUsmSs", databaseURL: "https://jodi-4d904-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = "";
const SUPER_ADMIN = "santoshbagul";

const masterSquads = {
    "RCB": ["Virat Kohli", "Faf du Plessis", "Rajat Patidar", "Glenn Maxwell", "Cameron Green", "Phil Salt", "Mohammed Siraj", "Yash Dayal", "Karn Sharma", "Anuj Rawat", "Will Jacks"],
    "GT": ["Shubman Gill", "Rashid Khan", "Sai Sudharsan", "Rahul Tewatia", "Shahrukh Khan", "David Miller", "Jos Buttler", "Kagiso Rabada", "Mohit Sharma", "Umesh Yadav"],
    "MI": ["Hardik Pandya", "Rohit Sharma", "Suryakumar Yadav", "Jasprit Bumrah", "Tilak Varma", "Ishan Kishan", "Tim David", "Gerald Coetzee", "Piyush Chawla", "Akash Madhwal"],
    "CSK": ["Ruturaj Gaikwad", "MS Dhoni", "Ravindra Jadeja", "Shivam Dube", "Rachin Ravindra", "Matheesha Pathirana", "Sanju Samson", "Deepak Chahar", "Tushar Deshpande"],
    "DC": ["Rishabh Pant", "Axar Patel", "Kuldeep Yadav", "Tristan Stubbs", "Jake Fraser-McGurk", "KL Rahul", "Mitchell Starc", "Mukesh Kumar", "Khaleel Ahmed"],
    "PBKS": ["Arshdeep Singh", "Sam Curran", "Shashank Singh", "Ashutosh Sharma", "Harpreet Brar", "Jitesh Sharma", "Liam Livingstone", "Harshal Patel", "Rahul Chahar"],
    "RR": ["Sanju Samson", "Yashasvi Jaiswal", "Riyan Parag", "Dhruv Jurel", "Trent Boult", "Yuzvendra Chahal", "Sandeep Sharma", "Avesh Khan", "Rovman Powell"],
    "SRH": ["Pat Cummins", "Travis Head", "Abhishek Sharma", "Heinrich Klaasen", "Nitish Reddy", "Bhuvneshwar Kumar", "T. Natarajan", "Mayank Markande", "Jaydev Unadkat"],
    "KKR": ["Shreyas Iyer", "Sunil Narine", "Andre Russell", "Rinku Singh", "Varun Chakaravarthy", "Venkatesh Iyer", "Harshit Rana", "Ramandeep Singh", "Mitchell Starc"],
    "LSG": ["Nicholas Pooran", "Quinton de Kock", "Marcus Stoinis", "Ravi Bishnoi", "Mayank Yadav", "Ayush Badoni", "Krunal Pandya", "Naveen-ul-Haq", "Mohsin Khan"]
};

// --- AUTHENTICATION ---
function handleAuth() {
    let id = loginId.value.toLowerCase().trim();
    let pass = loginPass.value.trim();
    if(!id || !pass) return alert("Enter details");

    db.ref("Users/"+id).once("value", s => {
        if(s.exists() && s.val().password === pass) {
            proceedToApp(id);
        } else if(!s.exists()) {
            db.ref("Users/"+id).set({password: pass, coins: 500});
            proceedToApp(id);
        } else {
            alert("Wrong Password!");
        }
    });
}

function proceedToApp(id) {
    user = id;
    loginBox.classList.add("hidden");
    mainApp.classList.remove("hidden");
    coinDisplay.classList.remove("hidden");
    if(user === SUPER_ADMIN) adminBtn.classList.remove("hidden");
    db.ref("Users/"+user+"/coins").on("value", s => userBalance.innerText = s.val() || 0);
}

// --- MATCH LOGIC ---
function initMatchView() {
    let mid = matchDropdown.value;
    if(!mid) return;

    let opt = matchDropdown.options[matchDropdown.selectedIndex];
    let t1 = opt.getAttribute("data-t1");
    let t2 = opt.getAttribute("data-t2");

    t1Name.innerText = t1; t2Name.innerText = t2;
    selectionArea.classList.remove("hidden");
    scoreContainer.classList.remove("hidden");

    // Initialize Players in DB if not exist
    db.ref("Players/"+mid).once("value", s => {
        if(!s.exists()){
            let data = { team1: {}, team2: {} };
            masterSquads[t1].forEach((p, i) => data.team1["p"+(i+1)] = p);
            masterSquads[t2].forEach((p, i) => data.team2["p"+(i+100)] = p);
            db.ref("Players/"+mid).set(data);
        }
    });

    renderPlayerSelects(mid);
    listenToScores(mid);
}

function renderPlayerSelects(mid) {
    db.ref("Players/"+mid).on("value", s => {
        let d = s.val(); if(!d) return;
        let h1 = "", h2 = "";
        for(let k in d.team1) h1 += `<option value="${k}">${d.team1[k]}</option>`;
        for(let k in d.team2) h2 += `<option value="${k}">${d.team2[k]}</option>`;
        p1Select.innerHTML = h1; p2Select.innerHTML = h2;
    });
}

function saveJodi() {
    let mid = matchDropdown.value;
    let p1id = p1Select.value, p2id = p2Select.value;
    let pairText = p1Select.options[p1Select.selectedIndex].text + " + " + p2Select.options[p2Select.selectedIndex].text;

    db.ref("Selections/"+mid).once("value", s => {
        let count = 0; s.forEach(x => { if(x.val().u === user) count++; });
        if(count >= 5) return alert("Limit 5 Jodis reached!");

        db.ref("Users/"+user+"/coins").once("value", c => {
            let bal = c.val() || 0;
            if(bal < 200) return alert("Low Balance!");
            db.ref("Users/"+user+"/coins").set(bal - 200);
            db.ref("Selections/"+mid).push({ u: user, p1: p1id, p2: p2id, txt: pairText });
            alert("Jodi Joined Successfully!");
        });
    });
}

function listenToScores(mid) {
    db.ref("Selections/"+mid).on("value", selSnap => {
        db.ref("LiveScore/"+mid).on("value", runSnap => {
            let runs = runSnap.val() || {};
            let html = "";
            selSnap.forEach(item => {
                let d = item.val();
                let s1 = runs[d.p1] || 0, s2 = runs[d.p2] || 0;
                html += `<div class="score-row">
                    <div><b class="text-primary">${d.u.toUpperCase()}</b><br><small class="text-muted">${d.txt}</small></div>
                    <div class="total-badge">${s1 + s2}</div>
                </div>`;
            });
            liveFeed.innerHTML = html || "<p class='p-3 text-center'>No one joined yet</p>";
        });
    });
}

// --- ADMIN CONTROLS ---
function toggleAdmin() {
    mainApp.classList.toggle("hidden");
    adminPanel.classList.toggle("hidden");
    if(!adminPanel.classList.contains("hidden")) loadAdminPlayers();
}

function loadAdminPlayers() {
    let mid = matchDropdown.value;
    if(!mid) return adminPlayerList.innerHTML = "<p class='p-3'>Select match first!</p>";
    
    db.ref("Players/"+mid).once("value", pSnap => {
        db.ref("LiveScore/"+mid).on("value", rSnap => {
            let r = rSnap.val() || {};
            let h = "";
            pSnap.forEach(team => {
                h += `<div class="bg-dark text-white p-1 small ps-2">${team.key.toUpperCase()}</div>`;
                team.forEach(p => {
                    h += `<div class="d-flex justify-content-between p-2 border-bottom">
                        <span>${p.val()}</span>
                        <input type="number" class="form-control form-control-sm w-25" value="${r[p.key]||0}" 
                        onchange="updateRun('${mid}','${p.key}',this.value)">
                    </div>`;
                });
            });
            adminPlayerList.innerHTML = h;
        });
    });
}

function updateRun(m, pid, val) {
    db.ref(`LiveScore/${m}/${pid}`).set(parseInt(val));
}

function addPlayerToDB() {
    let mid = matchDropdown.value;
    let team = targetTeam.value;
    let name = newPlayerName.value.trim();
    if(!mid || !name) return alert("Select Match & Name");
    
    let id = "p" + Date.now();
    db.ref(`Players/${mid}/${team}/${id}`).set(name).then(() => {
        newPlayerName.value = "";
        alert("Player Added!");
    });
}

function logout() { user = ""; location.reload(); }
</script>
</body>
</html>
