<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodi11 IPL 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #1a237e; --secondary: #ffab00; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); }
        .navbar { background: linear-gradient(135deg, #1a237e, #0d47a1); color: white; padding: 15px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .card { border: none; border-radius: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.06); margin-bottom: 15px; }
        .hidden { display: none !important; }
        .btn-join { background: #2e7d32; color: white; border-radius: 12px; width: 100%; font-weight: 600; padding: 12px; border: none; }
        .score-item { background: #fff; border-radius: 12px; padding: 10px; margin-bottom: 8px; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="navbar d-flex justify-content-between align-items-center px-3">
    <h4 class="m-0 fw-bold">🏏 JODI11</h4>
    <select id="langSelect" class="form-select form-select-sm w-auto" onchange="changeLanguage()">
        <option value="mr">मराठी</option>
        <option value="en">English</option>
    </select>
</div>

<div class="container mt-3">
    <div id="loginSection" class="card p-4 mx-auto" style="max-width: 400px;">
        <h5 class="text-center fw-bold mb-3" data-key="loginTitle">लॉगिन</h5>
        <input id="username" class="form-control mb-2" placeholder="User Name">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">
        <button onclick="login()" class="btn btn-primary w-100 fw-bold">LOGIN</button>
        <button onclick="signup()" class="btn btn-link w-100 mt-1 small" data-key="signupBtn">Sign Up</button>
    </div>

    <div id="homeSection" class="hidden">
        <div class="row g-2 mb-3">
            <div class="col-6"><div class="card p-2 text-center">👤 <b id="displayUser">--</b></div></div>
            <div class="col-6"><div class="card p-2 text-center text-warning">💰 <b id="displayCoins">0</b></div></div>
        </div>

        <div class="card p-3">
            <label class="small fw-bold mb-2" data-key="selectMatch">Select Match</label>
            <select id="matchSelect" class="form-select mb-3" onchange="checkMatchStatus()">
                <option value="">-- Choose --</option>
                <option value="MI_vs_CSK" data-date="2026-04-23" data-t1="MI" data-t2="CSK">MI vs CSK</option>
                <option value="RCB_vs_KKR" data-date="2026-04-24" data-t1="RCB" data-t2="KKR">RCB vs KKR</option>
                <option value="GT_vs_SRH" data-date="2026-04-25" data-t1="GT" data-t2="SRH">GT vs SRH</option>
                <option value="DC_vs_RR" data-date="2026-04-26" data-t1="DC" data-t2="RR">DC vs RR</option>
            </select>

            <div id="activeMatchArea" class="hidden">
                <div class="row g-2 mb-3">
                    <div class="col-6"><span id="labelT1" class="small fw-bold"></span><select id="p1" class="form-select"></select></div>
                    <div class="col-6"><span id="labelT2" class="small fw-bold"></span><select id="p2" class="form-select"></select></div>
                </div>
                <button onclick="joinMatch()" class="btn btn-join shadow" data-key="joinBtn">JOIN CONTEST (200)</button>
            </div>
            <div id="statusMsg" class="alert alert-warning text-center small fw-bold hidden"></div>
        </div>

        <div id="scoreArea" class="mt-3">
            <h6 class="fw-bold mb-2" data-key="scoreTitle">📊 Scoreboard</h6>
            <div id="joinList"></div>
        </div>

        <div class="d-grid gap-2 mt-4 pb-4">
            <button id="adminBtn" onclick="showAdmin()" class="btn btn-dark hidden">⚙️ ADMIN</button>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm" data-key="logout">LOGOUT</button>
        </div>
    </div>

    <div id="adminSection" class="card p-4 hidden">
        <h6 class="fw-bold text-danger mb-3">Admin Panel</h6>
        <select id="runMatch" class="form-select mb-2" onchange="syncAdminLabels()"></select>
        <select id="admTeam" class="form-select mb-2"><option value="team1">Team 1</option><option value="team2">Team 2</option></select>
        <input id="admPlayer" class="form-control mb-2" placeholder="New Player Name">
        <button onclick="addPlayer()" class="btn btn-primary btn-sm w-100">Add Player</button>
        <hr>
        <select id="runPlayer" class="form-select mb-2"></select>
        <input id="newRuns" type="number" class="form-control mb-2" placeholder="Runs">
        <button onclick="updateRuns()" class="btn btn-warning btn-sm w-100">Update Score</button>
        <button onclick="goHome()" class="btn btn-link w-100 mt-2">Back</button>
    </div>
</div>

<script>
// --- FIREBASE ---
const firebaseConfig = { apiKey: "AIzaSyBjZYfXDA3HHLE_GrcYu--RSJkRpLUsmSs", databaseURL: "https://jodi-4d904-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = "";
const ADMINS = ["admin", "santoshbagul"];

// --- IN-BUILD PLAYERS DATA ---
const playersData = {
    "MI": ["Rohit Sharma", "Hardik Pandya", "Suryakumar Yadav", "Ishan Kishan", "Jasprit Bumrah", "Tilak Varma", "Tim David"],
    "CSK": ["MS Dhoni", "Ruturaj Gaikwad", "Ravindra Jadeja", "Shivam Dube", "Matheesha Pathirana", "Daryl Mitchell", "Rachin Ravindra"],
    "RCB": ["Virat Kohli", "Faf du Plessis", "Glenn Maxwell", "Mohammed Siraj", "Rajat Patidar", "Cameron Green", "Dinesh Karthik"],
    "KKR": ["Shreyas Iyer", "Sunil Narine", "Andre Russell", "Rinku Singh", "Mitchell Starc", "Venkatesh Iyer", "Varun Chakaravarthy"],
    "GT": ["Shubman Gill", "Rashid Khan", "David Miller", "Sai Sudharsan", "Mohammed Shami", "Rahul Tewatia"],
    "SRH": ["Pat Cummins", "Travis Head", "Abhishek Sharma", "Heinrich Klaasen", "Bhuvneshwar Kumar", "Aiden Markram"],
    "RR": ["Sanju Samson", "Yashasvi Jaiswal", "Jos Buttler", "Yuzvendra Chahal", "Trent Boult", "Riyan Parag"],
    "DC": ["Rishabh Pant", "David Warner", "Axar Patel", "Kuldeep Yadav", "Prithvi Shaw", "Mitchell Marsh"]
};

// --- SESSION ---
window.onload = () => { if(localStorage.getItem("jodiUser")) startSession(localStorage.getItem("jodiUser")); };

function startSession(u) {
    currentUser = u; loginSection.classList.add("hidden"); homeSection.classList.remove("hidden");
    displayUser.innerText = u;
    db.ref("Users/"+u+"/coins").on("value", sn => displayCoins.innerText = sn.val() || 0);
    if(ADMINS.includes(u)) adminBtn.classList.remove("hidden");
    runMatch.innerHTML = matchSelect.innerHTML;
}

function login() {
    let u = username.value.toLowerCase().trim(); let p = password.value.trim();
    db.ref("Users/"+u).once("value", s => {
        if(!s.exists() || s.val().password !== p) return alert("Wrong ID/Pass");
        localStorage.setItem("jodiUser", u); startSession(u);
    });
}

function logout() { localStorage.removeItem("jodiUser"); location.reload(); }

// --- LOGIC ---
function checkMatchStatus() {
    let sel = matchSelect; if(!sel.value) return;
    let t1 = sel.options[sel.selectedIndex].getAttribute("data-t1");
    let t2 = sel.options[sel.selectedIndex].getAttribute("data-t2");
    let matchDate = sel.options[sel.selectedIndex].getAttribute("data-date");
    let today = new Date().toISOString().split('T')[0];

    labelT1.innerText = t1; labelT2.innerText = t2;

    if(matchDate === today) {
        activeMatchArea.classList.remove("hidden"); statusMsg.classList.add("hidden");
        autoLoadPlayers(sel.value, t1, t2);
    } else {
        activeMatchArea.classList.add("hidden"); statusMsg.classList.remove("hidden");
        statusMsg.innerText = (matchDate > today) ? "🔒 Coming Soon" : "⌛ Finished";
        loadJoined(sel.value);
    }
}

// Automatic players load karnyathi
function autoLoadPlayers(matchId, t1, t2) {
    db.ref("Players/"+matchId).once("value", snap => {
        if(!snap.exists()) {
            // Jar database madhe nastil tar in-build list madhun load kara
            playersData[t1].forEach(p => db.ref("Players/"+matchId+"/team1").push(p));
            playersData[t2].forEach(p => db.ref("Players/"+matchId+"/team2").push(p));
        }
        loadPlayersUI(matchId);
    });
}

function loadPlayersUI(m) {
    db.ref("Players/"+m+"/team1").once("value", s => {
        let h = ""; s.forEach(d => h += `<option>${d.val()}</option>`);
        p1.innerHTML = h;
    });
    db.ref("Players/"+m+"/team2").once("value", s => {
        let h = ""; s.forEach(d => h += `<option>${d.val()}</option>`);
        p2.innerHTML = h;
    });
    loadJoined(m);
}

function joinMatch() {
    let m = matchSelect.value; let pair = p1.value + " & " + p2.value;
    db.ref("Selections/"+m).once("value", snap => {
        let count = 0, isDup = false;
        snap.forEach(c => { if(c.val().user === currentUser) { count++; if(c.val().pair === pair) isDup = true; }});
        if(isDup) return alert("❌ Same Jodi!");
        if(count >= 5) return alert("❌ Max 5 Limit!");

        db.ref("Users/"+currentUser+"/coins").once("value", c => {
            if(c.val() < 200) return alert("Low Coins!");
            db.ref("Users/"+currentUser+"/coins").set(c.val() - 200);
            db.ref("Selections/"+m).push({user: currentUser, pair: pair});
            alert("✅ Joined!");
        });
    });
}

function loadJoined(m) {
    db.ref("Selections/"+m).on("value", snap => {
        db.ref("LiveScore/"+m).on("value", sc => {
            let scores = sc.val() || {}; joinList.innerHTML = "";
            snap.forEach(u => {
                let d = u.val(); let p = d.pair.split(" & ");
                let r1 = scores[p[0]] || 0, r2 = scores[p[1]] || 0;
                joinList.innerHTML += `<div class="score-item"><div><b>${d.user}</b><br><small>${d.pair}</small></div><div class="text-end"><b>${r1}+${r2}</b><br>Total: ${r1+r2}</div></div>`;
            });
        });
    });
}

// ADMIN
function syncAdminLabels() { loadAdminPlayers(); }
function addPlayer() {
    db.ref("Players/"+runMatch.value+"/"+admTeam.value).push(admPlayer.value).then(()=>alert("Saved"));
}
function loadAdminPlayers() {
    runPlayer.innerHTML = "";
    db.ref("Players/"+runMatch.value).once("value", s => s.forEach(t => t.forEach(p => runPlayer.innerHTML += `<option>${p.val()}</option>`)));
}
function updateRuns() {
    db.ref("LiveScore/"+runMatch.value+"/"+runPlayer.value).set(parseInt(newRuns.value)).then(()=>alert("Updated"));
}
function signup() {
    let u = username.value.toLowerCase().trim(); let p = password.value.trim();
    db.ref("Users/"+u).set({password:p, coins:2000}).then(()=>alert("Done"));
}
function showAdmin() { homeSection.classList.add("hidden"); adminSection.classList.remove("hidden"); }
function goHome() { adminSection.classList.add("hidden"); homeSection.classList.remove("hidden"); }
function changeLanguage() { /* Toggle Labels logic */ }
</script>
</body>
</html>
