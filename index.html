<html>
<head>
  <title>Jodi11 IPL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body { font-family: Arial; background:#f5f5f5; padding:15px; }
    input, select, button {
      width:100%; padding:10px; margin:5px 0;
      border-radius:8px; border:1px solid #ccc;
    }
    button { background:green; color:white; }
    .card { background:white; padding:15px; margin-top:10px; border-radius:10px; }
    .hidden { display:none; }
  </style>
</head>

<body>

<h2>🏏 Jodi11 IPL</h2>

<!-- LOGIN -->
<div id="login">
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div id="home" class="hidden">
  <div class="card">👤 <span id="user"></span></div>
  <div class="card">💰 Coins: <span id="coins"></span></div>

  <select id="match" onchange="loadPlayers()">
    <option value="">Select Match</option>
    <option value="match1">MI vs CSK</option>
    <option value="match2">RCB vs KKR</option>
  </select>

  <div id="playerBox" class="hidden">
    <select id="p1"></select>
    <select id="p2"></select>

    <button onclick="joinMatch()">Join Jodi (200)</button>
    <p id="msg"></p>
  </div>
<h3>📋 Joined Users</h3>
<div id="joinList"></div>backHomekHome<button onclick="loadHistory()">📜 History</button>
  <button onclick="loadLeaderboard()">🏆 Leaderboard</button>

  <div id="adminBtn" class="hidden">
    <button onclick="openAdmin()">🔐 Admin Panel</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">
  <h3>Admin Panel</h3>
  <input id="adminMatch" placeholder="match1">
  <input id="team" placeholder="team1 / team2">
  <input id="playerName" placeholder="Player Name">
  <button onclick="addPlayer()">Add Player</button>
  
<button onclick="goBack()">⬅ Back</button>
</div>

<!-- HISTORY -->
<div id="history" class="hidden">
  <h3>History</h3>
  <div id="historyList"></div>
  <button onclick="backHome()">Back</button>
</div>

<!-- LEADERBOARD -->
<div id="leader" class="hidden">
  <h3>Leaderboard</h3>
  <div id="leaderList"></div>
  <button onclick="backHome()">Back</button>
</div>

<script>
// 🔥 Firebase config (already added)
firebase.initializeApp({
  apiKey: "AIzaSyBjZYfXDA3HHLE_GrcYu--RSJkRpLUsmSs",
  databaseURL: "https://jodi-4d904-default-rtdb.firebaseio.com"
});

const db = firebase.database();
let currentUser = "";
const ADMIN_USER = "admin";

// Signup
function signup() {
  let u = username.value.toLowerCase().trim();
  let p = password.value.trim();

  db.ref("Users/" + u).once("value").then(snap => {
    if (snap.exists()) return alert("User exists ❌");

    db.ref("Users/" + u).set({
      password: p,
      coins: 2000
    });

    alert("Signup Success ✅");
  });
}

// Login
function login() {
  let u = username.value.toLowerCase().trim();
  let p = password.value.trim();

  db.ref("Users/" + u).once("value").then(snap => {

    if (!snap.exists()) return alert("User not exist ❌");

    let d = snap.val();

    if (d.password.trim() === p) {
      currentUser = u;

      document.getElementById("login").style.display="none";
      document.getElementById("home").style.display="block";

      user.innerText = u;
      coins.innerText = d.coins;

      if (u === ADMIN_USER)
        document.getElementById("adminBtn").style.display="block";

    } else {
      alert("Wrong password ❌");
    }
  });
}

// Load Players
function loadPlayers() {
  let m = match.value;
  if (!m) return;

  p1.innerHTML="";
  p2.innerHTML="";

  db.ref("Players/"+m+"/Match1/"+m+"MI").once("value").then(snap=>{
    snap.forEach(d=>p1.innerHTML+=`<option>${d.val()}</option>`);
  });

  db.ref("Players/"+m+"/CSK").once("value").then(snap=>{
    snap.forEach(d=>p2.innerHTML+=`<option>${d.val()}</option>`);
  });

  document.getElementById("playerBox").style.display="block";

  // 🔥 NEW
  loadJoined();
}functionn
function joinMatch() {
  let m = match.value;
  let pair = p1.value + "_" + p2.value;

  db.ref("Selections/"+m+"/"+pair).once("value").then(snap=>{
    if (snap.exists()) {
      msg.innerText="Already taken ❌";
      return;
    }
    return db.ref("Users/"+currentUser).once("value");
  }).then(snap=>{
    if (!snap) return;

    let d = snap.val();

    if (d.coins < 200) {
      msg.innerText="Coins low ❌";
      return;
    }

    db.ref("Selections/"+m+"/"+pair).set(currentUser);

    db.ref("History/"+currentUser).push({
      match:m,
      pair:pair,
      time:new Date().toLocaleString()
    });

    let newCoin = d.coins - 200;
    db.ref("Users/"+currentUser+"/coins").set(newCoin);

    coins.innerText=newCoin;
    msg.innerText="Joined ✅";
  });
}

// History
function loadHistory() {
  home.style.display="none";
  history.style.display="block";
  historyList.innerHTML="";

  db.ref("History/"+currentUser).once("value").then(snap=>{
    snap.forEach(d=>{
      let v=d.val();
      historyList.innerHTML+=`<div>${v.match} - ${v.pair}<br>${v.time}</div><hr>`;
    });
  });
}

// Leaderboard
function loadLeaderboard() {
  home.style.display="none";
  leader.style.display="block";
  leaderList.innerHTML="";

  db.ref("Users").once("value").then(snap=>{
    let arr=[];
    snap.forEach(d=>arr.push({name:d.key,coins:d.val().coins}));
    arr.sort((a,b)=>b.coins-a.coins);

    arr.forEach(u=>{
      leaderList.innerHTML+=`<div>${u.name} - 💰 ${u.coins}</div><hr>`;
    });
  });
}

// Admin
function openAdmin() {
  home.style.display="none";
  admin.style.display="block";
}
function goBack() {
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("home").style.display = "block";
}
function addPlayer() {
  let m = adminMatch.value;
  let t = team.value;
  let p = playerName.value;

  if (!m || !t || !p) return alert("Fill all ❌");

  let id = "p" + Date.now();
  db.ref("Players/"+m+"/"+t+"/"+id).set(p);

  alert("Player Added ✅");
}

function backHome() {
  history.style.display="none";
  leader.style.display="none";
  admin.style.display="none";
  home.style.display="block";
}
</script>

</body>
</html>
