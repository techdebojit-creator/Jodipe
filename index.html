<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodi11 IPL - Win Coins</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 24px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-primary { background: #1e3c72; border: none; border-radius: 10px; padding: 12px; font-weight: 600; }
        .btn-primary:hover { background: #2a5298; }
        .coin-box { background: #fff; color: #ff9800; font-weight: bold; padding: 10px; border-radius: 10px; text-align: center; font-size: 18px; border: 1px solid #ff9800; }
        .hidden { display: none; }
        .joined-item { background: #e8f5e9; padding: 10px; border-radius: 8px; margin-bottom: 5px; border-left: 5px solid #4caf50; font-size: 14px; }
        .admin-badge { background: #dc3545; color: white; font-size: 12px; padding: 2px 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="navbar">🏏 Jodi11 IPL</div>

<div class="container mt-4">
    <div id="loginSection" class="card p-4">
        <h4 class="text-center mb-3">Login / Signup</h4>
        <input id="username" class="form-control mb-2" placeholder="Username (Small letters)">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">
        <div class="d-grid gap-2">
            <button onclick="login()" class="btn btn-primary">Login</button>
            <button onclick="signup()" class="btn btn-outline-secondary">Create New Account</button>
        </div>
    </div>

    <div id="homeSection" class="hidden">
        <div class="row mb-3">
            <div class="col-6">
                <div class="card p-2 text-center">👤 <span id="displayUser"></span></div>
            </div>
            <div class="col-6">
                <div class="coin-box">💰 <span id="displayCoins">0</span></div>
            </div>
        </div>

        <div class="card p-3">
            <label class="form-label fw-bold">Select Today's Match:</label>
            <select id="matchSelect" class="form-select mb-3" onchange="loadPlayers()">
                <option value="">-- Choose Match --</option>
            </select>

            <div id="playerSelection" class="hidden">
                <div class="row">
                    <div class="col-6">
                        <label class="small fw-bold">Team 1 Player</label>
                        <select id="p1" class="form-select"></select>
                    </div>
                    <div class="col-6">
                        <label class="small fw-bold">Team 2 Player</label>
                        <select id="p2" class="form-select"></select>
                    </div>
                </div>
                <button onclick="joinMatch()" class="btn btn-success w-100 mt-3">Join Contest (200 Coins)</button>
                <p id="msg" class="text-center mt-2 fw-bold"></p>
            </div>
        </div>

        <div id="joinedSection" class="card p-3 hidden">
            <h5 class="fw-bold">📋 Active Jodis</h5>
            <div id="joinList"></div>
        </div>

        <div class="d-grid gap-2">
            <button onclick="showLeaderboard()" class="btn btn-info text-white">🏆 Leaderboard</button>
            <button id="adminBtn" onclick="showAdmin()" class="btn btn-dark hidden">⚙️ Admin Panel</button>
            <button onclick="logout()" class="btn btn-light btn-sm mt-3">Logout</button>
        </div>
    </div>

    <div id="adminSection" class="card p-4 hidden">
        <h5>Admin Control</h5>
        <input id="admMatch" class="form-control mb-2" placeholder="Match Name (e.g. MIvsCSK)">
        <select id="admTeam" class="form-select mb-2">
            <option value="team1">Team 1</option>
            <option value="team2">Team 2</option>
        </select>
        <input id="admPlayer" class="form-control mb-2" placeholder="Player Name">
        <button onclick="addPlayer()" class="btn btn-danger w-100">Add Player to Match</button>
        <button onclick="goHome()" class="btn btn-link w-100 mt-2">Back to Home</button>
    </div>

    <div id="leaderSection" class="card p-4 hidden">
        <h4 class="text-center">Top Players</h4>
        <div id="leaderList" class="mt-3"></div>
        <button onclick="goHome()" class="btn btn-primary w-100 mt-3">Back</button>
    </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyBjZYfXDA3HHLE_GrcYu--RSJkRpLUsmSs",
    databaseURL: "https://jodi-4d904-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = "";
const ADMINS = ["admin", "santoshbagul"];

// --- Functions ---

function signup() {
    let u = document.getElementById("username").value.toLowerCase().trim();
    let p = document.getElementById("password").value.trim();
    if(!u || !p) return alert("Please enter details");

    db.ref("Users/" + u).once("value", s => {
        if(s.exists()) {
            alert("Username already taken!");
        } else {
            db.ref("Users/" + u).set({ password: p, coins: 2000 })
            .then(() => alert("Registration Successful! Now Login."));
        }
    });
}

function login() {
    let u = document.getElementById("username").value.toLowerCase().trim();
    let p = document.getElementById("password").value.trim();

    db.ref("Users/" + u).once("value", s => {
        if(!s.exists()) return alert("User not found!");
        let data = s.val();
        if(data.password === p) {
            currentUser = u;
            document.getElementById("loginSection").classList.add("hidden");
            document.getElementById("homeSection").classList.remove("hidden");
            document.getElementById("displayUser").innerText = u;
            
            // Live Coin Update
            db.ref("Users/" + u + "/coins").on("value", snap => {
                document.getElementById("displayCoins").innerText = snap.val();
            });

            if(ADMINS.includes(u)) document.getElementById("adminBtn").classList.remove("hidden");
            loadMatches();
        } else {
            alert("Wrong Password!");
        }
    });
}

function loadMatches() {
    let select = document.getElementById("matchSelect");
    select.innerHTML = "<option value=''>-- Choose Match --</option>";
    db.ref("Players").once("value", snap => {
        snap.forEach(m => {
            select.innerHTML += `<option value="${m.key}">${m.key}</option>`;
        });
    });
}

function loadPlayers() {
    let m = document.getElementById("matchSelect").value;
    if(!m) return;

    let p1 = document.getElementById("p1");
    let p2 = document.getElementById("p2");
    p1.innerHTML = ""; p2.innerHTML = "";

    db.ref("Players/" + m + "/team1").once("value", s => {
        s.forEach(d => p1.innerHTML += `<option value="${d.val()}">${d.val()}</option>`);
    });
    db.ref("Players/" + m + "/team2").once("value", s => {
        s.forEach(d => p2.innerHTML += `<option value="${d.val()}">${d.val()}</option>`);
    });

    document.getElementById("playerSelection").classList.remove("hidden");
    document.getElementById("joinedSection").classList.remove("hidden");
    loadJoined(m);
}

function joinMatch() {
    let m = document.getElementById("matchSelect").value;
    let player1 = document.getElementById("p1").value;
    let player2 = document.getElementById("p2").value;
    let pair = player1 + " & " + player2;

    db.ref("Selections/" + m + "/" + currentUser).once("value", s => {
        if(s.exists()) {
            document.getElementById("msg").innerText = "❌ You already joined this match!";
            document.getElementById("msg").style.color = "red";
            return;
        }

        db.ref("Users/" + currentUser + "/coins").once("value", cSnap => {
            let currentCoins = cSnap.val();
            if(currentCoins < 200) {
                alert("Not enough coins!");
                return;
            }

            // Deduct coins and Save Selection
            db.ref("Users/" + currentUser + "/coins").set(currentCoins - 200);
            db.ref("Selections/" + m + "/" + currentUser).set(pair);
            document.getElementById("msg").innerText = "✅ Joined Successfully!";
            document.getElementById("msg").style.color = "green";
        });
    });
}

function loadJoined(m) {
    db.ref("Selections/" + m).on("value", snap => {
        let list = document.getElementById("joinList");
        list.innerHTML = "";
        if(!snap.exists()) { list.innerHTML = "<small>No one joined yet.</small>"; return; }
        
        snap.forEach(u => {
            list.innerHTML += `<div class="joined-item"><b>${u.key}</b> picked: ${u.val()}</div>`;
        });
    });
}

function showLeaderboard() {
    document.getElementById("homeSection").classList.add("hidden");
    document.getElementById("leaderSection").classList.remove("hidden");
    let list = document.getElementById("leaderList");
    list.innerHTML = "Loading...";

    db.ref("Users").once("value", s => {
        let arr = [];
        s.forEach(d => arr.push({ name: d.key, coins: d.val().coins }));
        arr.sort((a, b) => b.coins - a.coins);
        
        list.innerHTML = "";
        arr.forEach((x, index) => {
            list.innerHTML += `<div class="d-flex justify-content-between p-2 border-bottom">
                <span>${index + 1}. ${x.name}</span>
                <span class="fw-bold text-success">${x.coins}</span>
            </div>`;
        });
    });
}

function addPlayer() {
    let m = document.getElementById("admMatch").value.trim();
    let t = document.getElementById("admTeam").value;
    let p = document.getElementById("admPlayer").value.trim();
    if(!m || !p) return alert("Fill all fields");

    db.ref("Players/" + m + "/" + t).push(p).then(() => {
        alert("Player Added!");
        document.getElementById("admPlayer").value = "";
        loadMatches();
    });
}

function showAdmin() { 
    document.getElementById("homeSection").classList.add("hidden");
    document.getElementById("adminSection").classList.remove("hidden");
}

function goHome() {
    document.getElementById("adminSection").classList.add("hidden");
    document.getElementById("leaderSection").classList.add("hidden");
    document.getElementById("homeSection").classList.remove("hidden");
}

function logout() {
    location.reload();
}
</script>

</body>
</html>
