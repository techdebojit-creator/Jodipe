<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodi11 IPL 2026 - Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #1a237e; --secondary: #ffab00; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); }
        .navbar { background: linear-gradient(135deg, #1a237e, #0d47a1); color: white; padding: 15px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .team-logo { width: 45px; height: 45px; object-fit: contain; margin-bottom: 5px; background: white; border-radius: 50%; padding: 3px; }
        .coin-badge { background: #fff3e0; color: #e65100; padding: 6px 15px; border-radius: 25px; font-weight: 700; border: 1px solid #ffcc80; }
        .btn-join { background: linear-gradient(to right, #2e7d32, #43a047); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 600; width: 100%; }
        .score-row { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .score-row:last-child { border: none; }
        .my-jodi-box { background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 12px; padding: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="navbar d-flex justify-content-between align-items-center px-3">
    <h4 class="m-0 fw-bold">🏏 JODI11 <small class="fw-light">PRO</small></h4>
    <div id="coinArea" class="hidden"><span class="coin-badge">💰 <span id="displayCoins">0</span></span></div>
</div>

<div class="container mt-3">
    <div id="loginSection" class="card p-4 mx-auto" style="max-width: 400px;">
        <h5 class="text-center fw-bold mb-4">Login</h5>
        <input id="username" class="form-control mb-2" placeholder="User ID">
        <input id="password" type="password" class="form-control mb-4" placeholder="Password">
        <button onclick="login()" class="btn btn-primary w-100 fw-bold py-2 shadow">LOGIN</button>
        <button onclick="signup()" class="btn btn-link w-100 mt-2 text-muted small">New User? Signup</button>
    </div>

    <div id="homeSection" class="hidden">
        <div class="card p-3 mb-3">
            <label class="small fw-bold text-muted mb-2">Match Select करा</label>
            <select id="matchSelect" class="form-select mb-3" onchange="checkMatchStatus()">
                <option value="">-- मॅच निवडा --</option>
                <option value="MI_vs_CSK" data-date="2026-04-23" data-t1="MI" data-t2="CSK">MI vs CSK</option>
                <option value="RCB_vs_SRH" data-date="2026-04-24" data-t1="RCB" data-t2="SRH">RCB vs SRH</option>
                <option value="GT_vs_KKR" data-date="2026-04-25" data-t1="GT" data-t2="KKR">GT vs KKR</option>
                <option value="LSG_vs_RR" data-date="2026-04-26" data-t1="LSG" data-t2="RR">LSG vs RR</option>
            </select>

            <div id="activeMatchArea" class="hidden">
                <div class="row g-2 mb-3">
                    <div class="col-6 text-center">
                        <img id="imgT1" class="team-logo" src=""><br>
                        <b id="labelT1"></b>
                        <select id="p1" class="form-select form-select-sm mt-1"></select>
                    </div>
                    <div class="col-6 text-center">
                        <img id="imgT2" class="team-logo" src=""><br>
                        <b id="labelT2"></b>
                        <select id="p2" class="form-select form-select-sm mt-1"></select>
                    </div>
                </div>
                <button onclick="joinMatch()" class="btn btn-join shadow-sm">जोडी लावा (200 Coins)</button>
            </div>
            <div id="statusMsg" class="alert alert-warning text-center small fw-bold mt-2 hidden"></div>
        </div>

        <div id="myDashboard" class="hidden mb-4">
            <h6 class="fw-bold text-success">🎯 माझी जोडी (My Current Choice)</h6>
            <div id="myList"></div>
        </div>

        <div id="scoreArea">
            <h6 class="fw-bold mb-2">📊 सर्वांचा स्कोअर (All Users)</h6>
            <div id="joinList" class="card p-3"></div>
        </div>

        <div class="d-grid gap-2 mt-4 pb-5">
            <button id="adminBtn" onclick="showAdmin()" class="btn btn-dark hidden">⚙️ ADMIN PANEL</button>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm">LOGOUT</button>
        </div>
    </div>

    <div id="adminSection" class="card p-4 hidden">
        <h6 class="fw-bold text-danger mb-3 border-bottom pb-2">⚙️ Admin Control</h6>
        <label class="small fw-bold">Select Match</label>
        <select id="runMatch" class="form-select mb-3" onchange="loadAdminPlayers()"></select>
        
        <div class="bg-light p-3 rounded mb-3">
            <label class="small fw-bold">Update Score (Player Name Disel)</label>
            <select id="runPlayer" class="form-select mb-2"></select>
            <input id="newRuns" type="number" class="form-control mb-2" placeholder="Runs taka">
            <button onclick="updateRuns()" class="btn btn-warning btn-sm w-100 fw-bold">स्कोअर अपडेट करा</button>
        </div>

        <div class="bg-light p-3 rounded">
            <label class="small fw-bold">Add Player manually</label>
            <select id="admTeamSelect" class="form-select mb-2"><option value="team1">Team 1</option><option value="team2">Team 2</option></select>
            <input id="admPlayerName" class="form-control mb-2" placeholder="Player Nav">
            <button onclick="addPlayer()" class="btn btn-primary btn-sm w-100">प्लेअर ॲड करा</button>
        </div>
        
        <button onclick="goHome()" class="btn btn-link w-100 mt-3">Home ला परत जा</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyBjZYfXDA3HHLE_GrcYu--RSJkRpLUsmSs", databaseURL: "https://jodi-4d904-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = "";
const ADMINS = ["admin", "santoshbagul"];

// 2026 UPDATED TEAM DATA
const teamData = {
    "MI": { logo: "https://documents.iplt20.com/ipl/MI/Logos/Logo_Round/MI_Logo_Round.png", players: ["Hardik Pandya", "Rohit Sharma", "Suryakumar Yadav", "Jasprit Bumrah", "Quinton De Kock", "Shardul Thakur", "Tilak Verma"] },
    "CSK": { logo: "https://documents.iplt20.com/ipl/CSK/Logos/Logo_Round/CSK_Logo_Round.png", players: ["Ruturaj Gaikwad", "MS Dhoni", "Ravindra Jadeja", "Shivam Dube", "Sanju Samson", "Ayush Mhatre"] },
    "RCB": { logo: "https://documents.iplt20.com/ipl/RCB/Logos/Logo_Round/RCB_Logo_Round.png", players: ["Virat Kohli", "Rajat Patidar", "Phil Salt", "Krunal Pandya", "Jitesh Sharma", "Bhuvneshwar Kumar"] },
    "SRH": { logo: "https://documents.iplt20.com/ipl/SRH/Logos/Logo_Round/SRH_Logo_Round.png", players: ["Pat Cummins", "Travis Head", "Abhishek Sharma", "Heinrich Klaasen", "Nitish Reddy"] },
    "KKR": { logo: "https://documents.iplt20.com/ipl/KKR/Logos/Logo_Round/KKR_Logo_Round.png", players: ["Shreyas Iyer", "Sunil Narine", "Andre Russell", "Rinku Singh", "Mitchell Starc"] },
    "GT": { logo: "https://documents.iplt20.com/ipl/GT/Logos/Logo_Round/GT_Logo_Round.png", players: ["Shubman Gill", "Rashid Khan", "David Miller", "Mohammed Shami"] },
    "RR": { logo: "https://documents.iplt20.com/ipl/RR/Logos/Logo_Round/RR_Logo_Round.png", players: ["Yashasvi Jaiswal", "Sam Curran", "Dhruv Jurel", "Jofra Archer"] },
    "LSG": { logo: "https://documents.iplt20.com/ipl/LSG/Logos/Logo_Round/LSG_Logo_Round.png", players: ["Rishabh Pant", "Nicholas Pooran", "Mohammed Shami", "Mitchell Marsh"] },
    "DC": { logo: "https://documents.iplt20.com/ipl/DC/Logos/Logo_Round/DC_Logo_Round.png", players: ["KL Rahul", "Axar Patel", "Kuldeep Yadav", "Mitchell Starc"] }
};

window.onload = () => { if(localStorage.getItem("jodiUser")) startSession(localStorage.getItem("jodiUser")); };

function startSession(u) {
    currentUser = u; loginSection.classList.add("hidden"); homeSection.classList.remove("hidden"); coinArea.classList.remove("hidden");
    db.ref("Users/"+u+"/coins").on("value", s => displayCoins.innerText = s.val() || 0);
    if(ADMINS.includes(u)) adminBtn.classList.remove("hidden");
    runMatch.innerHTML = matchSelect.innerHTML;
}

function checkMatchStatus() {
    let sel = matchSelect; if(!sel.value) return;
    let t1 = sel.options[sel.selectedIndex].getAttribute("data-t1");
    let t2 = sel.options[sel.selectedIndex].getAttribute("data-t2");
    let matchDate = sel.options[sel.selectedIndex].getAttribute("data-date");
    let today = new Date().toISOString().split('T')[0];

    imgT1.src = teamData[t1].logo; imgT2.src = teamData[t2].logo;
    labelT1.innerText = t1; labelT2.innerText = t2;

    if(matchDate === today) {
        activeMatchArea.classList.remove("hidden"); statusMsg.classList.add("hidden");
        loadPlayers(sel.value, t1, t2);
    } else {
        activeMatchArea.classList.add("hidden"); statusMsg.classList.remove("hidden");
        statusMsg.innerText = (matchDate > today) ? "🔒 मॅच लवकरच सुरू होईल ("+matchDate+")" : "⌛ मॅच संपली आहे";
        refreshScore(sel.value);
    }
}

function loadPlayers(mid, t1, t2) {
    db.ref("Players/"+mid).once("value", snap => {
        if(!snap.exists()) {
            teamData[t1].players.forEach((p, i) => db.ref(`Players/${mid}/team1/${t1.toLowerCase()}${i+1}`).set(p));
            teamData[t2].players.forEach((p, i) => db.ref(`Players/${mid}/team2/${t2.toLowerCase()}${i+1}`).set(p));
        }
        db.ref(`Players/${mid}/team1`).once("value", s => {
            let h = ""; s.forEach(d => h += `<option value="${d.key}">${d.val()}</option>`); p1.innerHTML = h;
        });
        db.ref(`Players/${mid}/team2`).once("value", s => {
            let h = ""; s.forEach(d => h += `<option value="${d.key}">${d.val()}</option>`); p2.innerHTML = h;
        });
        refreshScore(mid);
    });
}

function joinMatch() {
    let mid = matchSelect.value;
    let pairID = p1.value + "|" + p2.value;
    let pairNames = p1.options[p1.selectedIndex].text + " & " + p2.options[p2.selectedIndex].text;

    db.ref("Selections/"+mid).once("value", snap => {
        let count = 0, isDup = false;
        snap.forEach(c => { if(c.val().user === currentUser) { count++; if(c.val().pairID === pairID) isDup = true; }});
        if(isDup) return alert("❌ ही जोडी तुम्ही आधीच निवडली आहे!");
        if(count >= 5) return alert("❌ तुम्ही जास्तीत जास्त ५ जोड्या लावू शकता.");

        db.ref("Users/"+currentUser+"/coins").once("value", c => {
            if((c.val() || 0) < 200) return alert("पुरेशी कॉइन्स नाहीत!");
            db.ref("Users/"+currentUser+"/coins").set(c.val() - 200);
            db.ref("Selections/"+mid).push({user: currentUser, pairID: pairID, pairNames: pairNames});
            alert("✅ जोडी लावली!");
        });
    });
}

function refreshScore(mid) {
    db.ref("Selections/"+mid).on("value", snap => {
        db.ref("LiveScore/"+mid).on("value", scoreSnap => {
            let runs = scoreSnap.val() || {};
            let globalHTML = ""; let myHTML = ""; let hasMy = false;

            snap.forEach(u => {
                let d = u.val(); let ids = d.pairID.split("|");
                let r1 = runs[ids[0]] || 0; let r2 = runs[ids[1]] || 0;
                let row = `<div class="score-row"><div><b>${d.user}</b><br><small>${d.pairNames}</small></div><div class="text-end"><b>${r1}+${r2}</b><br><span class="badge bg-primary">Total: ${r1+r2}</span></div></div>`;
                globalHTML += row;
                if(d.user === currentUser) { myHTML += row; hasMy = true; }
            });

            joinList.innerHTML = globalHTML || "कोणीही जोडी लावली नाही.";
            if(hasMy) { myDashboard.classList.remove("hidden"); myList.innerHTML = `<div class="my-jodi-box shadow-sm">${myHTML}</div>`; }
            else { myDashboard.classList.add("hidden"); }
        });
    });
}

// ADMIN LOGIC
function loadAdminPlayers() {
    let mid = runMatch.value; runPlayer.innerHTML = "";
    db.ref("Players/"+mid).once("value", s => {
        s.forEach(team => { team.forEach(p => {
            runPlayer.innerHTML += `<option value="${p.key}">${p.val()} (${team.key})</option>`;
        })});
    });
}

function updateRuns() {
    db.ref(`LiveScore/${runMatch.value}/${runPlayer.value}`).set(parseInt(newRuns.value)).then(()=>alert("स्कोअर अपडेट झाला!"));
}

function addPlayer() {
    let mid = runMatch.value;
    let newKey = admTeamSelect.value + Date.now();
    db.ref(`Players/${mid}/${admTeamSelect.value}/${newKey}`).set(admPlayerName.value).then(()=>alert("Player ॲड झाला!"));
}

function login() {
    let u = username.value.toLowerCase().trim(); let p = password.value.trim();
    db.ref("Users/"+u).once("value", s => {
        if(!s.exists() || s.val().password !== p) return alert("Wrong ID/Pass");
        localStorage.setItem("jodiUser", u); startSession(u);
    });
}
function signup() {
    let u = username.value.toLowerCase().trim(); let p = password.value.trim();
    db.ref("Users/"+u).set({password:p, coins:2000}).then(()=>alert("Account Done!"));
}
function logout() { localStorage.removeItem("jodiUser"); location.reload(); }
function showAdmin() { homeSection.classList.add("hidden"); adminSection.classList.remove("hidden"); }
function goHome() { adminSection.classList.add("hidden"); homeSection.classList.remove("hidden"); }
</script>
</body>
</html>
