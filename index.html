<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JODI11 PRO - Wallet Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #002f6c; --secondary: #ffcc00; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; font-size: 14px; }
        .navbar { background: var(--primary); color: white; border-bottom: 3px solid var(--secondary); }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .btn-primary { background: var(--primary); border: none; }
        .admin-badge { background: #ffebee; color: #c62828; font-weight: bold; border: 1px solid #ef9a9a; }
        .coin-req-card { background: #fff; border-left: 5px solid #28a745; margin-bottom: 10px; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<nav class="navbar px-3 py-2">
    <div class="container-fluid d-flex justify-content-between">
        <h5 class="m-0 fw-bold">🏏 JODI11 PRO v.1.06</h5>
        <div id="coinBox" class="hidden d-flex align-items-center gap-2">
            <span class="badge bg-light text-dark shadow-sm">💰 <span id="balanceText">0</span></span>
            <button onclick="toggleCoinReq()" class="btn btn-sm btn-warning fw-bold">+</button>
        </div>
    </div>
</nav>

<div class="container mt-3">
    <div id="authSection" class="card p-4 mx-auto shadow" style="max-width: 400px;">
        <h4 class="text-center fw-bold mb-4" id="authTitle">Login</h4>
        <input id="userId" class="form-control mb-3" placeholder="Username">
        <input id="userPass" type="password" class="form-control mb-3" placeholder="Password">
        <div id="loginGroup">
            <button onclick="handleAuth(true)" class="btn btn-primary w-100 fw-bold mb-3">LOG IN</button>
            <p class="text-center small">Account nahi? <a href="#" onclick="toggleAuth(false)">Sign Up</a></p>
        </div>
        <div id="signupGroup" class="hidden">
            <button onclick="handleAuth(false)" class="btn btn-success w-100 fw-bold mb-3">SIGN UP</button>
            <p class="text-center small">Account aahe? <a href="#" onclick="toggleAuth(true)">Login</a></p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div id="coinReqArea" class="card p-3 mb-3 border-warning hidden">
            <h6 class="fw-bold small">Add Coins Request</h6>
            <div class="input-group input-group-sm">
                <input id="reqAmt" type="number" class="form-control" placeholder="Amount (उदा. 500)">
                <button onclick="sendCoinRequest()" class="btn btn-warning fw-bold">Request</button>
            </div>
        </div>

        <div class="card p-3 mb-3">
            <label class="small fw-bold text-muted">SELECT MATCH</label>
            <select id="matchSelect" class="form-select mb-3" onchange="loadMatchBoard()"></select>

            <div id="playArea" class="hidden">
                <div class="row g-2 mb-3">
                    <div class="col-6"><select id="p1" class="form-select form-select-sm"></select></div>
                    <div class="col-6"><select id="p2" class="form-select form-select-sm"></select></div>
                </div>
                <button onclick="joinJodi()" class="btn btn-success w-100 fw-bold">JOIN JODI (200 Coins)</button>
            </div>
        </div>

        <h6 class="fw-bold">📊 LIVE STANDINGS</h6>
        <div id="scoreBoard" class="card p-2 mb-4" style="min-height: 100px;"></div>

        <div class="d-flex gap-2 pb-5">
            <button id="adminBtn" onclick="showAdmin()" class="btn btn-dark w-100 hidden">⚙️ ADMIN CONTROL</button>
            <button onclick="location.reload()" class="btn btn-outline-danger w-100">LOGOUT</button>
        </div>
    </div>

    <div id="adminPanel" class="hidden">
        <div class="card p-3 admin-badge mb-3">
            <h6 class="m-0">ADMIN MASTER CONTROL</h6>
        </div>

        <div class="card p-3 mb-3 border-success shadow-sm">
            <p class="fw-bold small mb-2 text-success">💰 PENDING COIN REQUESTS</p>
            <div id="adminReqListArea">
                <p class="text-center text-muted small">No pending requests.</p>
            </div>
        </div>

        <div class="card p-3 mb-3 border-primary">
            <p class="fw-bold small mb-2 text-primary">1. Add New IPL Match</p>
            <input id="newMatchId" class="form-control form-control-sm mb-2" placeholder="Match ID (MI_vs_RCB)">
            <input id="team1Name" class="form-control form-control-sm mb-2" placeholder="Team 1 Name">
            <input id="team2Name" class="form-control form-control-sm mb-2" placeholder="Team 2 Name">
            <button onclick="addNewMatch()" class="btn btn-primary btn-sm w-100">Create Match</button>
        </div>
 <div class="card p-3 mb-3 border-success">
    <p class="fw-bold small mb-2 text-success text-uppercase">➕ Add Missing Player</p>
    
    <label class="small fw-bold text-muted">Select Match</label>
    <select id="targetMatch" class="form-select form-select-sm mb-2"></select>
    
    <label class="small fw-bold text-muted">Select Team</label>
    <select id="playerTeam" class="form-select form-select-sm mb-2">
        <option value="team1">Team 1</option>
        <option value="team2">Team 2</option>
    </select>
    
    <input id="playerName" class="form-control form-control-sm mb-2" placeholder="Enter Player Name">
    
    <button onclick="addPlayerToMatch()" class="btn btn-success btn-sm w-100">Add Player</button>
</div>

        <div class="card p-3 mb-3 border-warning">
            <p class="fw-bold small mb-2">2. Live Run Updater</p>
            <div id="adminPlayerList" class="bg-white border rounded" style="max-height: 250px; overflow-y: auto;"></div>
        </div>

        <button onclick="closeAdmin()" class="btn btn-secondary w-100 mb-5">Back to Home</button>
    </div>
</div>

        <script>
const firebaseConfig = { 
    apiKey: "AIzaSyBjZYfXDA3HHLE_GrcYu--RSJkRpLUsmSs", 
    databaseURL: "https://jodi-4d904-default-rtdb.firebaseio.com" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = "";
const ADMIN_ID = "santoshbagul";

// --- AUTH SYSTEM (LOGIN/SIGNUP) ---
function toggleAuth(isLogin) {
    document.getElementById("authTitle").innerText = isLogin ? "Login" : "Sign Up";
    document.getElementById("loginGroup").classList.toggle("hidden", !isLogin);
    document.getElementById("signupGroup").classList.toggle("hidden", isLogin);
}

function handleAuth(isLogin) {
    let id = document.getElementById("userId").value.toLowerCase().trim();
    let pass = document.getElementById("userPass").value.trim();

    if(!id || !pass) return alert("Username आणि Password टाका!");

    db.ref("Users/" + id).once("value", s => {
        if(isLogin) {
            // Login Logic
            if(s.exists()) {
                let userData = s.val();
                if(userData.password === pass) {
                    proceedApp(id);
                } else {
                    alert("चुकीचा पासवर्ड!");
                }
            } else {
                alert("हा युजर अस्तित्वात नाही. Sign Up करा.");
            }
        } else {
            // Sign Up Logic
            if(s.exists()) {
                alert("हा युजरनेम आधीच वापरला गेला आहे!");
            } else {
                db.ref("Users/" + id).set({
                    password: pass,
                    coins: 500 // नवीन युजरला ५०० फ्री कॉइन्स
                }).then(() => {
                    alert("Registration यशस्वी झाले!");
                    proceedApp(id);
                }).catch(e => alert("Error: " + e.message));
            }
        }
    });
}

function proceedApp(id) {
    user = id;
    

    document.getElementById("authSection").classList.add("hidden");
    document.getElementById("mainApp").classList.remove("hidden");
    document.getElementById("navActions").classList.remove("hidden");
    
    document.getElementById("profileName").innerText = user.toUpperCase();
    document.getElementById("profileInitial").innerText = user.charAt(0).toUpperCase();

    if(user === ADMIN_ID) document.getElementById("adminBtn").classList.remove("hidden");
    
    db.ref("Users/"+user+"/coins").on("value", s => {
        let bal = s.val() || 0;
        document.getElementById("profileBalance").innerText = bal;
        document.getElementById("balanceText").innerText = bal; // Navbar sathi
    });

    loadMatches();
}

// --- WALLET LOGIC ---
function toggleCoinReq() { 
    document.getElementById("coinReqArea").classList.toggle("hidden"); 
}

function sendCoinRequest() {
    let amt = parseInt(document.getElementById("reqAmt").value);
    if(!amt || amt <= 0) return alert("योग्य रक्कम टाका!");
    
    db.ref("CoinRequests").push({
        u: user,
        amount: amt,
        time: Date.now()
    }).then(() => {
        alert("Request पाठवली! ऍडमिन लवकरच अप्रूव्ह करतील.");
        document.getElementById("reqAmt").value = ""; 
        toggleCoinReq();
    });
}

function listenCoinRequests() {
    db.ref("CoinRequests").on("value", s => {
        let h = "";
        if(!s.exists()) {
            h = "<p class='text-center text-muted small'>No pending requests.</p>";
        } else {
            s.forEach(req => {
                let d = req.val();
                h += `<div class="d-flex justify-content-between align-items-center coin-req-card shadow-sm">
                        <div><b>${d.u}</b><br><span class="text-success fw-bold">₹${d.amount}</span></div>
                        <button onclick="approveCoins('${req.key}', '${d.u}', ${d.amount})" class="btn btn-sm btn-success">Approve</button>
                      </div>`;
            });
        }
        document.getElementById("adminReqListArea").innerHTML = h;
    });
}

function approveCoins(reqId, targetUser, amt) {
    db.ref("Users/" + targetUser + "/coins").once("value", s => {
        let current = s.val() || 0;
        db.ref("Users/" + targetUser + "/coins").set(current + amt).then(() => {
            db.ref("CoinRequests/" + reqId).remove();
            alert("कॉइन्स जमा झाले!");
        });
    });
}

// --- MATCH LOGIC ---
function loadMatches() {
    db.ref("MatchList").on("value", s => {
        let h = "<option value=''>-- Select Match --</option>";
        s.forEach(m => {
            h += `<option value="${m.key}">${m.val().name}</option>`;
        });
        // Match selection doghi kade update kara
        document.getElementById("matchSelect").innerHTML = h; // Main UI
        document.getElementById("targetMatch").innerHTML = h; // Admin UI
    });
}


function loadMatchBoard() {
    let mid = document.getElementById("matchSelect").value; 
    if(!mid) return;
    document.getElementById("playArea").classList.remove("hidden");
    db.ref("Players/" + mid).on("value", s => {
        let d = s.val(); if(!d) return;
        let h1="", h2="";
        for(let k in d.team1) h1 += `<option value="${k}">${d.team1[k]}</option>`;
        for(let k in d.team2) h2 += `<option value="${k}">${d.team2[k]}</option>`;
        document.getElementById("p1").innerHTML = h1; 
        document.getElementById("p2").innerHTML = h2;
    });
    listenScores(mid);
}

function joinJodi() {
    let mid = document.getElementById("matchSelect").value;
    let p1id = document.getElementById("p1").value;
    let p2id = document.getElementById("p2").value;
    let pairId = [p1id, p2id].sort().join("_");
    let pairName = document.getElementById("p1").options[document.getElementById("p1").selectedIndex].text + " + " + document.getElementById("p2").options[document.getElementById("p2").selectedIndex].text;

    db.ref("Selections/" + mid).once("value", snapshot => {
        let isAlreadyTaken = false;
        snapshot.forEach(item => {
            let data = item.val();
            if ([data.p1, data.p2].sort().join("_") === pairId) isAlreadyTaken = true;
        });

        if (isAlreadyTaken) return alert("❌ ही जोडी आधीच घेतली गेली आहे!");

        db.ref("Users/" + user + "/coins").once("value", c => {
            let bal = c.val() || 0;
            if (bal < 200) return alert("कॉइन्स कमी आहेत!");
            db.ref("Selections/" + mid).push({ u: user, p1: p1id, p2: p2id, txt: pairName });
            db.ref("Users/" + user + "/coins").set(bal - 200);
            alert("✅ जोडी लावली!");
        });
    });
}

function listenScores(mid) {
    db.ref("Selections/" + mid).on("value", sel => {
        db.ref("LiveScore/" + mid).on("value", sc => {
            let runs = sc.val() || {}; let h = "";
            sel.forEach(item => {
                let d = item.val(); 
                let s1 = runs[d.p1] || 0, s2 = runs[d.p2] || 0;
                h += `<div class="d-flex justify-content-between p-2 border-bottom">
                    <div><b>${d.u.toUpperCase()}</b><br><small>${d.txt}</small></div>
                    <div class="badge bg-primary fs-6 h-50 mt-2">${s1+s2}</div>
                </div>`;
            });
            document.getElementById("scoreBoard").innerHTML = h || "<p class='text-center p-3'>No Jodis yet</p>";
        });
    });
}

function addNewMatch() {
    let mid = document.getElementById("newMatchId").value.trim();
    let t1 = document.getElementById("team1Name").value;
    let t2 = document.getElementById("team2Name").value;
    db.ref("MatchList/" + mid).set({ name: t1 + " vs " + t2 });
    alert("Match Created!");
}
function addPlayerToMatch() {
    let mid = document.getElementById("targetMatch").value; // Nivadleli Match ID
    let team = document.getElementById("playerTeam").value; // Team 1 ki Team 2
    let pName = document.getElementById("playerName").value.trim(); // Player cha naav

    if(!mid || !pName) return alert("Match निवडा आणि Player चे नाव टाका!");

    // Player sathi ek unique ID banva (Timestamp mule duplicate hot nahi)
    let pid = "p" + Date.now();

    // Firebase madhe Player save kara
    db.ref(`Players/${mid}/${team}/${pid}`).set(pName).then(() => {
        // Player add jhalya nantar Scoreboard madhe tyache runs 0 set kara
        db.ref(`LiveScore/${mid}/${pid}`).set(0);
        
        alert("✅ Player यशस्वीरीत्या Add झाला!");
        document.getElementById("playerName").value = ""; // Input clear kara
    }).catch(e => alert("Error: " + e.message));
}

function showAdmin() { 
    document.getElementById("mainApp").classList.add("hidden"); 
    document.getElementById("adminPanel").classList.remove("hidden"); 
    loadAdminPlayers(); 
    listenCoinRequests(); 
}

function closeAdmin() { 
    document.getElementById("adminPanel").classList.add("hidden"); 
    document.getElementById("mainApp").classList.remove("hidden"); 
}

function loadAdminPlayers() {
    let mid = document.getElementById("matchSelect").value;
    if(!mid) return document.getElementById("adminPlayerList").innerHTML = "<p class='p-3'>Select match first!</p>";
    db.ref("Players/" + mid).once("value", p => {
        db.ref("LiveScore/" + mid).on("value", sc => {
            let r = sc.val() || {}; let h = "";
            p.forEach(team => {
                h += `<div class="bg-dark text-white p-1 small ps-2">${team.key.toUpperCase()}</div>`;
                team.forEach(player => {
                    h += `<div class="d-flex justify-content-between p-1 border-bottom bg-white">
                        <span class="ps-2">${player.val()}</span>
                        <input type="number" class="form-control form-control-sm w-25" value="${r[player.key]||0}" 
                        onchange="db.ref('LiveScore/${mid}/${player.key}').set(parseInt(this.value))">
                    </div>`;
                });
            });
            document.getElementById("adminPlayerList").innerHTML = h;
        });
    });
}
            

</script>

</body>
</html>
