<!DOCTYPE html>
<html>
<head>
  <title>Jodi11 App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ Firebase scripts FIRST -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5; }
    input, button, select {
      width:100%; padding:10px; margin:5px 0;
      border-radius:8px; border:1px solid #ccc;
    }
    button { background:green; color:white; }
    .hidden { display:none; }
    .card { background:white; padding:15px; margin-top:10px; border-radius:10px; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginDiv">
  <h2>Login / Signup</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div id="homeDiv" class="hidden">
  <h2>Welcome <span id="user"></span></h2>
  <div class="card">💰 Coins: <span id="coins"></span></div>

  <div class="card">
    <h3>Select Players</h3>
    <select id="p1">
      <option>Rohit</option>
      <option>Ishan</option>
      <option>Surya</option>
    </select>

    <select id="p2">
      <option>Dhoni</option>
      <option>Jadeja</option>
      <option>Rahane</option>
    </select>

    <button onclick="joinMatch()">Join Match (200 Coins)</button>
    <p id="msg"></p>
  </div>
</div>

<script>
// 🔥 🔥 FIREBASE CONFIG (REPLACE THIS)
const firebaseConfig = {
  apiKey: "AIzaSyBjZYfXDA3HHLE_GrcYu--RSJkRpLUsmSs",
  databaseURL: "https://jodi-4d904-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = "";

// ✅ SIGNUP
function signup() {
  let u = document.getElementById("username").value.toLowerCase().trim();
  let p = document.getElementById("password").value.trim();

  if (!u || !p) {
    alert("Fill all fields ❌");
    return;
  }

  db.ref("Users/" + u).once("value").then(snap => {

    if (snap.exists()) {
      alert("User already exists ❌");
    } else {
      db.ref("Users/" + u).set({
        password: p,
        coins: 2000
      });
      alert("Signup Success ✅");
    }

  }).catch(err => {
    console.log(err);
    alert("Error signup ❌");
  });
}

// ✅ LOGIN (FIXED)
function login() {
  try {
    let u = document.getElementById("username").value.toLowerCase().trim();
    let p = document.getElementById("password").value.trim();

    console.log("Username:", u);
    console.log("Password:", p);

    if (!u || !p) {
      alert("Fill all fields ❌");
      return;
    }

    db.ref("Users/" + u).once("value")
    .then(snap => {

      if (!snap.exists()) {
        alert("User not exist ❌");
        return;
      }

      let data = snap.val();
      console.log("Firebase Data:", data);

      if (data.password && data.password.trim() === p) {
        currentUser = u;
        showHome(data.coins);
      } else {
        alert("Wrong password ❌");
      }

    })
    .catch(err => {
      console.log(err);
      alert("Error login ❌");
    });

  } catch(e) {
    console.log(e);
    alert("Error login ❌");
  }
}

// ✅ SHOW HOME
function showHome(c) {
  document.getElementById("loginDiv").style.display = "none";
  document.getElementById("homeDiv").style.display = "block";

  document.getElementById("user").innerText = currentUser;
  document.getElementById("coins").innerText = c;
}

// ✅ JOIN MATCH
function joinMatch() {
  let p1 = document.getElementById("p1").value;
  let p2 = document.getElementById("p2").value;

  let pair = p1 + "_" + p2;

  db.ref("Selections/match1/" + pair).once("value")
  .then(snap => {

    if (snap.exists()) {
      document.getElementById("msg").innerText = "Already Joined ❌";
      return;
    }

    return db.ref("Users/" + currentUser).once("value");

  })
  .then(snap => {
    if (!snap) return;

    let data = snap.val();

    if (data.coins < 200) {
      document.getElementById("msg").innerText = "Not enough coins ❌";
      return;
    }

    // save pair
    db.ref("Selections/match1/" + pair).set(currentUser);

    // deduct coins
    let newCoins = data.coins - 200;
    db.ref("Users/" + currentUser + "/coins").set(newCoins);

    document.getElementById("coins").innerText = newCoins;
    document.getElementById("msg").innerText = "Joined Successfully ✅";

  })
  .catch(err => {
    console.log(err);
    alert("Join error ❌");
  });
}
</script>

</body>
</html>
